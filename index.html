<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Family Control Center</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:Georgia,serif;background:#f5f2ee;min-height:100vh;font-size:14px}
#app{max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:20px}

/* Header */
header{background:#2c2c2c;padding:14px 16px 10px;color:#fff}
.header-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.brand{display:flex;align-items:baseline;gap:8px}
.brand-name{font-size:20px;font-weight:bold}
.brand-sub{font-size:10px;color:#aaa;letter-spacing:2px;text-transform:uppercase}
.today-label{font-size:11px;color:#f0c040;margin-top:3px;letter-spacing:.5px}
.header-btns{display:flex;gap:6px;margin-top:2px}
.hbtn{background:#3a3a3a;border:none;color:#ccc;border-radius:6px;padding:6px 10px;cursor:pointer;display:flex;align-items:center;gap:4px;font-size:11px;font-family:Georgia,serif}
.month-nav{display:flex;align-items:center;justify-content:center;gap:20px;margin-top:8px}
.mnav-btn{background:transparent;border:none;color:#fff;cursor:pointer;font-size:20px;padding:4px 8px;line-height:1}
.month-label{font-size:16px;font-weight:bold;min-width:120px;text-align:center;color:#fff}

/* Balance */
.balance{padding:14px 16px;color:#fff;transition:background .3s}
.balance-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.balance-title{font-size:11px;opacity:.85;text-transform:uppercase;letter-spacing:1px}
.balance-amount{font-size:24px;font-weight:bold;letter-spacing:-1px}
.balance-details{display:flex;gap:12px;font-size:11px;opacity:.8;flex-wrap:wrap}

/* Tabs */
nav{display:flex;background:#2c2c2c;border-bottom:2px solid #111}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:10px 4px;background:transparent;border:none;color:#888;cursor:pointer;border-bottom:3px solid transparent;font-family:Georgia,serif}
.tab-btn.active{color:#fff;border-bottom:3px solid #f0c040}
.tab-icon{font-size:18px}
.tab-label{text-transform:uppercase;letter-spacing:1px;font-size:9px}

/* Main */
main{padding:14px 10px}

/* Card */
.card{background:#fff;border-radius:12px;padding:14px;box-shadow:0 2px 12px rgba(0,0,0,.07);margin-bottom:14px}
.card-title{font-size:14px;font-weight:bold;margin-bottom:12px}

/* Row */
.row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid #f0ede9}
.row-left{flex:1;min-width:0}
.row-main{font-size:13px;color:#333;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row-sub{font-size:11px;color:#999;margin-top:1px}
.row-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.row-value{font-size:13px;font-weight:600;color:#222}

/* Buttons */
.btn{border:none;border-radius:6px;cursor:pointer;font-family:Georgia,serif;display:flex;align-items:center;gap:4px}
.btn-dark{background:#2c2c2c;color:#fff;padding:7px 12px;font-size:12px}
.btn-icon{background:transparent;padding:4px;color:#666;font-size:16px;line-height:1}
.btn-icon.red{color:#e74c3c}
.btn-add{display:flex;align-items:center;justify-content:center;gap:6px;background:#f5f2ee;border:1px dashed #ccc;border-radius:8px;padding:8px 14px;font-size:13px;cursor:pointer;margin-bottom:8px;width:100%;font-family:Georgia,serif}
.btn-pay{color:#fff;border:none;border-radius:6px;padding:5px 10px;font-size:11px;cursor:pointer;font-family:Georgia,serif;white-space:nowrap}

/* Form */
.formbox{background:#faf9f7;border-radius:8px;padding:12px;margin-top:8px;display:flex;flex-direction:column;gap:8px}
.frow{display:flex;gap:8px;align-items:center}
input[type=text],input[type=number],input[type=date],select{border:1px solid #ddd;border-radius:6px;padding:7px 10px;font-size:13px;background:#fff;width:100%;font-family:Georgia,serif;-webkit-appearance:none;appearance:none}
input:focus,select:focus{border-color:#8e44ad;outline:none}
input[type=checkbox]{width:16px;height:16px;cursor:pointer;flex-shrink:0}
.checkbox-label{display:flex;align-items:center;gap:6px;font-size:12px;color:#555;white-space:nowrap;cursor:pointer}

/* Category header */
.cat-header{display:flex;justify-content:space-between;align-items:center;font-size:11px;font-weight:bold;color:#555;text-transform:uppercase;letter-spacing:1px;margin:10px 0 4px;padding-bottom:4px;border-bottom:2px solid #eee;cursor:pointer}
.cat-header-left{display:flex;align-items:center;gap:6px}
.cat-total{color:#e74c3c}
.subcat-label{font-size:10px;color:#aaa;font-style:italic;padding:2px 0 2px 8px;border-left:2px solid #f0ede9;margin-top:4px}
.shop-cat-label{font-size:11px;font-weight:bold;color:#888;text-transform:uppercase;letter-spacing:1px;margin:10px 0 4px;border-bottom:1px solid #eee;padding-bottom:2px}

/* Shopping item */
.shop-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f0ede9}
.check-circle{width:24px;height:24px;border-radius:6px;border:2px solid #ccc;background:#fff;cursor:pointer;flex-shrink:0;font-size:12px;display:flex;align-items:center;justify-content:center}
.check-circle.done{border-color:#27ae60;background:#27ae60;color:#fff}

/* Bill */
.bill-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0ede9}
.bill-row.urgent{background:#fff9e6;border-radius:8px;padding:8px;border-left:3px solid #f39c12;margin:2px 0}
.bill-icon{font-size:20px;margin-right:8px}
.bill-name{font-size:14px;font-weight:600}
.bill-sub{font-size:11px;color:#999;margin-top:2px}
.badge-urgent{font-size:10px;background:#f39c12;color:#fff;border-radius:4px;padding:2px 5px;margin-left:6px}

/* Misc */
.empty{padding:20px 0;text-align:center;color:#aaa;font-size:13px;font-style:italic}
.divider{margin:14px 0 8px;font-size:12px;color:#888}
.total-line{margin-top:10px;font-size:13px;color:#555;text-align:right}
.presets-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.preset-btn{background:#f5f2ee;border:1px solid #ddd;border-radius:20px;padding:4px 12px;font-size:12px;cursor:pointer;color:#444;font-family:Georgia,serif}
.preset-tag{display:flex;align-items:center;gap:4px;background:#f5f2ee;border:1px solid #ddd;border-radius:20px;padding:4px 10px;font-size:12px}
.preset-del{background:transparent;border:none;cursor:pointer;color:#e74c3c;padding:0;font-size:12px;line-height:1}
.clear-cart{margin-top:10px;width:100%;background:#fdf0f0;color:#e74c3c;border:1px solid #f5c6c6;border-radius:8px;padding:8px;font-size:13px;cursor:pointer;font-family:Georgia,serif}
.toggle-presets{background:transparent;border:none;color:#888;font-size:12px;cursor:pointer;padding:6px 0;text-align:left;font-family:Georgia,serif}
.settings-section{margin-bottom:6px}
.settings-cat-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f0ede9}
.settings-cat-btn{background:transparent;border:none;cursor:pointer;display:flex;align-items:center;gap:6px;font-size:13px;color:#333;flex:1;text-align:left;font-family:Georgia,serif;font-weight:600}
.settings-cat-count{font-size:10px;color:#aaa;font-weight:normal}
.sub-panel{background:#faf9f7;border-radius:8px;padding:10px;margin-top:4px}
.sub-row{display:flex;align-items:center;justify-content:space-between;padding:3px 0;font-size:12px;color:#555}
.no-sub{font-size:12px;color:#bbb;font-style:italic;margin-bottom:6px}
.add-cat-section{margin-top:10px;border-top:1px dashed #ddd;padding-top:10px}
.add-cat-label{font-size:12px;color:#888;margin-bottom:6px}
.opacity-60{opacity:.6}
</style>
</head>
<body>
<div id="app"></div>
<input type="file" id="import-file" accept=".json" style="display:none">

<script>
// ── Storage & Defaults ────────────────────────────────────────────────────────
const STORAGE_KEY = "fcc_data_v2";

const DEFAULT_EXPENSE_CATS = [
  {id:"casa",name:"Casa",icon:"🏠",subs:["Affitto/Mutuo","Manutenzione","Arredamento","Elettrodomestici"]},
  {id:"cibo",name:"Cibo",icon:"🍽️",subs:["Supermercato","Ristorante","Frutteria","Macelleria","Panetteria"]},
  {id:"trasporti",name:"Trasporti",icon:"🚗",subs:["Carburante","Parcheggio","Mezzi pubblici","Taxi/Uber"]},
  {id:"salute",name:"Salute",icon:"💊",subs:["Farmacia","Medico","Dentista","Esami"]},
  {id:"abbigliamento",name:"Abbigliamento",icon:"👕",subs:["Adulti","Bambini","Scarpe","Accessori"]},
  {id:"svago",name:"Svago",icon:"🎭",subs:["Cinema/Teatro","Sport","Vacanze","Hobby"]},
  {id:"istruzione",name:"Istruzione",icon:"📚",subs:["Libri","Corsi","Scuola","Università"]},
  {id:"altro",name:"Altro",icon:"📦",subs:[]},
];
const DEFAULT_SHOP_CATS = [
  {id:"alimentari",name:"Alimentari",subs:[]},
  {id:"pulizia",name:"Pulizia",subs:[]},
  {id:"igiene",name:"Igiene",subs:[]},
  {id:"frigo",name:"Frigo",subs:[]},
  {id:"freschissimi",name:"Freschissimi",subs:[]},
  {id:"altro",name:"Altro",subs:[]},
];
const BILL_ICONS = {Affitto:"🏠",Luce:"💡",Gas:"🔥",Acqua:"💧",Internet:"📶",Telefono:"📱",Abbonamento:"📺",Assicurazione:"🛡️",Mutuo:"🏦",Altro:"📄"};
const MONTHS = ["Gen","Feb","Mar","Apr","Mag","Giu","Lug","Ago","Set","Ott","Nov","Dic"];
const DAYS = ["Domenica","Lunedì","Martedì","Mercoledì","Giovedì","Venerdì","Sabato"];

const defaultData = {
  monthlyIncome:0, extraIncomes:[], expenses:[], bills:[], shoppingList:[],
  shoppingPresets:["Latte","Pane","Uova","Pasta","Riso","Acqua","Frutta","Verdura","Carne","Pesce","Olio","Sale","Zucchero","Caffè","Detersivo","Carta igienica"],
  expenseCats:DEFAULT_EXPENSE_CATS, shopCats:DEFAULT_SHOP_CATS,
};

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return JSON.parse(JSON.stringify(defaultData));
    const p = JSON.parse(raw);
    return {...JSON.parse(JSON.stringify(defaultData)),...p,
      expenseCats:p.expenseCats||DEFAULT_EXPENSE_CATS,
      shopCats:p.shopCats||DEFAULT_SHOP_CATS};
  } catch { return JSON.parse(JSON.stringify(defaultData)); }
}
function saveData(d) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch {} }

// ── Helpers ───────────────────────────────────────────────────────────────────
const uid = () => Math.random().toString(36).slice(2);
const fmt = n => "€ " + Number(n||0).toLocaleString("it-IT",{minimumFractionDigits:2,maximumFractionDigits:2});
const localYMD = d => { const dd=d||new Date(); return `${dd.getFullYear()}-${String(dd.getMonth()+1).padStart(2,"0")}-${String(dd.getDate()).padStart(2,"0")}`; };
const today = () => localYMD();
const currentYM = () => localYMD().slice(0,7);
const shiftYM = (ym,dir) => { const [y,m]=ym.split("-").map(Number); const d=new Date(y,m-1+dir,1); return localYMD(d).slice(0,7); };
const monthLabel = ym => { const [y,m]=ym.split("-"); return `${MONTHS[parseInt(m)-1]} ${y}`; };
const todayLabel = () => { const d=new Date(); return `${DAYS[d.getDay()]} ${d.getDate()} ${MONTHS[d.getMonth()]} ${d.getFullYear()}`; };
const e = (tag,cls,html,attrs) => {
  const el = document.createElement(tag);
  if (cls) el.className = cls;
  if (html !== undefined) el.innerHTML = html;
  if (attrs) Object.entries(attrs).forEach(([k,v]) => { if (k==="style") el.style.cssText=v; else el[k]=v; });
  return el;
};
const inp = (type,placeholder,val,style) => {
  const i = document.createElement("input");
  i.type=type; i.placeholder=placeholder||""; i.value=val||"";
  if(style) i.style.cssText=style;
  return i;
};
const sel = (options, val, style) => {
  const s = document.createElement("select");
  if(style) s.style.cssText=style;
  options.forEach(o => {
    const op = document.createElement("option");
    op.value = o; op.textContent = o;
    if (o === val) op.selected = true;
    s.appendChild(op);
  });
  return s;
};

// ── App State ─────────────────────────────────────────────────────────────────
let data = loadData();
let currentTab = "budget";
let viewMonth = currentYM();
// UI state
let ui = {
  editIncome: false,
  showAddExp: false,
  showAddBill: false,
  showPresets: false,
  expandedExpCats: {},
  expandedSettingsCat: null,
  expandedShopSettingsCat: null,
};

function update(fn) { fn(data); saveData(data); render(); }

// ── Derived ───────────────────────────────────────────────────────────────────
function derived() {
  const monthExpenses = data.expenses.filter(e => e.date && e.date.startsWith(viewMonth));
  const monthBillsPaid = data.bills.filter(b => b.paid && b.month === viewMonth);
  const monthExtras = data.extraIncomes.filter(e => e.month === viewMonth);
  const totalIncome = data.monthlyIncome + monthExtras.reduce((s,e)=>s+Number(e.amount),0);
  const totalSpent  = monthExpenses.reduce((s,e)=>s+Number(e.amount),0);
  const totalBills  = monthBillsPaid.reduce((s,b)=>s+Number(b.amount),0);
  const balance     = totalIncome - totalSpent - totalBills;
  return {monthExpenses,monthBillsPaid,monthExtras,totalIncome,totalSpent,totalBills,balance};
}

// ── Export / Import ───────────────────────────────────────────────────────────
function exportData() {
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json],{type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href=url; a.download=`fcc-backup-${today()}.json`; a.click();
  URL.revokeObjectURL(url);
}
document.getElementById("import-file").addEventListener("change", e => {
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const imported = JSON.parse(ev.target.result);
      data = {...JSON.parse(JSON.stringify(defaultData)),...imported};
      saveData(data); render(); alert("✅ Dati importati!");
    } catch { alert("❌ File non valido."); }
  };
  reader.readAsText(file);
  e.target.value = "";
});

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";
  app.appendChild(renderHeader());
  app.appendChild(renderBalance());
  app.appendChild(renderTabs());
  const main = e("main","");
  if (currentTab==="budget") main.appendChild(renderBudget());
  else if (currentTab==="bills") main.appendChild(renderBills());
  else if (currentTab==="shop") main.appendChild(renderShop());
  else if (currentTab==="settings") main.appendChild(renderSettings());
  app.appendChild(main);
}

// ── Header ────────────────────────────────────────────────────────────────────
function renderHeader() {
  const hdr = e("header");
  const top = e("div","header-top");
  const left = e("div");
  const brand = e("div","brand");
  brand.appendChild(e("span","brand-name","🏡 Family"));
  brand.appendChild(e("span","brand-sub","Control Center"));
  left.appendChild(brand);
  left.appendChild(e("div","today-label",todayLabel()));
  top.appendChild(left);
  const btns = e("div","header-btns");
  const bkp = e("button","hbtn","💾 Backup"); bkp.onclick=exportData;
  const imp = e("button","hbtn","📂 Importa"); imp.onclick=()=>document.getElementById("import-file").click();
  btns.appendChild(bkp); btns.appendChild(imp);
  top.appendChild(btns);
  hdr.appendChild(top);

  const nav = e("div","month-nav");
  const prev = e("button","mnav-btn","‹"); prev.onclick=()=>{viewMonth=shiftYM(viewMonth,-1);render();};
  const lbl = e("span","month-label",monthLabel(viewMonth));
  const next = e("button","mnav-btn","›"); next.onclick=()=>{viewMonth=shiftYM(viewMonth,+1);render();};
  nav.appendChild(prev); nav.appendChild(lbl); nav.appendChild(next);
  hdr.appendChild(nav);
  return hdr;
}

// ── Balance ───────────────────────────────────────────────────────────────────
function renderBalance() {
  const {totalIncome,totalSpent,totalBills,balance} = derived();
  const div = e("div","balance");
  div.style.background = balance>=0
    ? "linear-gradient(135deg,#1a6b3c,#27ae60)"
    : "linear-gradient(135deg,#7b1c1c,#c0392b)";
  const top = e("div","balance-top");
  top.appendChild(e("span","balance-title","Saldo disponibile"));
  top.appendChild(e("span","balance-amount",fmt(balance)));
  div.appendChild(top);
  const det = e("div","balance-details");
  det.appendChild(e("span","","Entrate "+fmt(totalIncome)));
  det.appendChild(e("span","","· Spese "+fmt(totalSpent)));
  det.appendChild(e("span","","· Bollette "+fmt(totalBills)));
  div.appendChild(det);
  return div;
}

// ── Tabs ──────────────────────────────────────────────────────────────────────
function renderTabs() {
  const tabs = [{id:"budget",label:"Budget",icon:"💰"},{id:"bills",label:"Scadenze",icon:"📅"},{id:"shop",label:"Spesa",icon:"🛒"},{id:"settings",label:"Impostaz.",icon:"⚙️"}];
  const nav = e("nav");
  tabs.forEach(t => {
    const btn = e("button","tab-btn"+(t.id===currentTab?" active":""));
    btn.appendChild(e("span","tab-icon",t.icon));
    btn.appendChild(e("span","tab-label",t.label));
    btn.onclick = () => { currentTab=t.id; render(); };
    nav.appendChild(btn);
  });
  return nav;
}

// ── BUDGET ────────────────────────────────────────────────────────────────────
function renderBudget() {
  const {monthExpenses, monthExtras, totalIncome} = derived();
  const cats = data.expenseCats || DEFAULT_EXPENSE_CATS;
  const frag = document.createDocumentFragment();

  // Income card
  const incCard = card("💰 Entrate","#27ae60");
  // Stipendio row
  const fixRow = e("div","row");
  const fl = e("div","row-left"); fl.appendChild(e("div","row-main","Stipendio fisso")); fixRow.appendChild(fl);
  const fr = e("div","row-right");
  fr.appendChild(e("span","row-value",fmt(data.monthlyIncome)));
  const editBtn = e("button","btn btn-icon","✏️"); editBtn.title="Modifica";
  editBtn.onclick = () => { ui.editIncome=!ui.editIncome; render(); };
  fr.appendChild(editBtn); fixRow.appendChild(fr); incCard.appendChild(fixRow);

  if (ui.editIncome) {
    const fb = e("div","formbox"); fb.style.marginTop="8px";
    const row = e("div","frow");
    const iInc = inp("number","€",data.monthlyIncome,"flex:1;min-width:0");
    const sv = e("button","btn btn-dark","✓ Salva");
    sv.onclick = () => { data.monthlyIncome=Number(iInc.value||0); ui.editIncome=false; saveData(data); render(); };
    row.appendChild(iInc); row.appendChild(sv); fb.appendChild(row); incCard.appendChild(fb);
  }

  // Extra incomes
  monthExtras.forEach(ex => {
    const r = e("div","row");
    const l = e("div","row-left"); l.appendChild(e("div","row-main",ex.label)); r.appendChild(l);
    const rr = e("div","row-right");
    rr.appendChild(e("span","row-value",fmt(ex.amount)));
    const d2 = e("button","btn btn-icon","🗑️"); d2.style.color="#e74c3c";
    d2.onclick = () => { data.extraIncomes=data.extraIncomes.filter(x=>x.id!==ex.id); saveData(data); render(); };
    rr.appendChild(d2); r.appendChild(rr); incCard.appendChild(r);
  });

  // Add extra
  const addExtraBox = e("div","formbox"); addExtraBox.style.marginTop="8px";
  const er = e("div","frow");
  const iLabel = inp("text","Entrata extra…","","flex:2;min-width:0");
  const iAmt = inp("number","€","","flex:1;min-width:60px");
  const addBtn = e("button","btn btn-dark","+ Aggiungi");
  addBtn.onclick = () => {
    if(!iLabel.value||!iAmt.value) return;
    data.extraIncomes.push({id:uid(),label:iLabel.value,amount:Number(iAmt.value),month:viewMonth});
    saveData(data); render();
  };
  er.appendChild(iLabel); er.appendChild(iAmt); er.appendChild(addBtn);
  addExtraBox.appendChild(er); incCard.appendChild(addExtraBox);

  const tl = e("div","total-line"); tl.innerHTML=`Totale entrate: <strong>${fmt(totalIncome)}</strong>`; incCard.appendChild(tl);
  frag.appendChild(incCard);

  // Expenses card
  const expCard = card("📤 Spese","#e74c3c");
  const addExpBtn = e("button","btn-add","+ Aggiungi spesa");
  addExpBtn.onclick = () => { ui.showAddExp=!ui.showAddExp; render(); };
  expCard.appendChild(addExpBtn);

  if (ui.showAddExp) {
    const fb = e("div","formbox");
    const iDesc = inp("text","Descrizione (es. Frutteria)","");
    const r1 = e("div","frow");
    const iAmt = inp("number","€","","flex:1;min-width:0"); 
    const iDate = inp("date","",today(),"flex:1;min-width:0");
    r1.appendChild(iAmt); r1.appendChild(iDate);

    // Category select
    const catNames = cats.map(c=>c.name);
    const sCat = sel(catNames, catNames[0]);
    sCat.style.flex="1";
    const sSub = sel(["— Sottocategoria —"], "","flex:1");
    const updateSubs = () => {
      const c = cats.find(x=>x.name===sCat.value);
      sSub.innerHTML="";
      const defOpt = document.createElement("option"); defOpt.value=""; defOpt.textContent="— Sottocategoria —"; sSub.appendChild(defOpt);
      if(c && c.subs && c.subs.length) { c.subs.forEach(s=>{const o=document.createElement("option");o.value=s;o.textContent=s;sSub.appendChild(o);}); sSub.style.display=""; }
      else sSub.style.display="none";
    };
    sCat.onchange=updateSubs; updateSubs();
    const catRow = e("div","frow"); catRow.appendChild(sCat); catRow.appendChild(sSub);

    const sv = e("button","btn btn-dark","✓ Salva spesa");
    sv.onclick = () => {
      if(!iDesc.value||!iAmt.value) return;
      data.expenses.push({id:uid(),label:iDesc.value,amount:Number(iAmt.value),date:iDate.value,category:sCat.value,subcategory:sSub.value||""});
      ui.showAddExp=false; saveData(data); render();
    };
    fb.appendChild(iDesc); fb.appendChild(r1); fb.appendChild(catRow); fb.appendChild(sv);
    expCard.appendChild(fb);
  }

  // Group by category
  const byCategory = cats.map(c=>({
    cat:c.name, icon:c.icon,
    items:monthExpenses.filter(x=>x.category===c.name),
    total:monthExpenses.filter(x=>x.category===c.name).reduce((s,x)=>s+Number(x.amount),0)
  })).filter(g=>g.items.length>0);

  if (byCategory.length===0) expCard.appendChild(e("div","empty","Nessuna spesa questo mese"));

  byCategory.forEach(g => {
    const expanded = ui.expandedExpCats[g.cat] !== false;
    const ch = e("div","cat-header");
    const cl = e("div","cat-header-left");
    cl.appendChild(e("span","",g.icon+" "+g.cat+" "));
    cl.appendChild(e("span","","("+g.items.length+")"));
    const cr = e("div",""); cr.style.display="flex"; cr.style.alignItems="center"; cr.style.gap="6px";
    cr.appendChild(e("span","cat-total",fmt(g.total)));
    cr.appendChild(e("span","",expanded?"▲":"▼"));
    ch.appendChild(cl); ch.appendChild(cr);
    ch.onclick = () => { ui.expandedExpCats[g.cat]=!expanded; render(); };
    expCard.appendChild(ch);

    if (expanded) {
      // Group by subcategory
      const bySub = {};
      g.items.forEach(it => { const s=it.subcategory||"—"; if(!bySub[s]) bySub[s]=[]; bySub[s].push(it); });
      const hasSubs = Object.keys(bySub).some(s=>s!=="—")||Object.keys(bySub).length>1;

      if (hasSubs) {
        Object.entries(bySub).forEach(([sub,items]) => {
          if(sub!=="—") expCard.appendChild(e("div","subcat-label",sub));
          items.forEach(it => expCard.appendChild(makeExpRow(it)));
        });
      } else {
        g.items.forEach(it => expCard.appendChild(makeExpRow(it)));
      }
    }
  });

  if (byCategory.length>0) {
    const tl2 = e("div","total-line");
    tl2.innerHTML=`Totale spese: <strong style="color:#e74c3c">${fmt(monthExpenses.reduce((s,x)=>s+Number(x.amount),0))}</strong>`;
    expCard.appendChild(tl2);
  }

  frag.appendChild(expCard);
  const wrap = e("div"); wrap.appendChild(frag); return wrap;
}

function makeExpRow(it) {
  const r = e("div","row");
  const l = e("div","row-left");
  l.appendChild(e("div","row-main",it.label));
  l.appendChild(e("div","row-sub",it.date||""));
  r.appendChild(l);
  const rr = e("div","row-right");
  rr.appendChild(e("span","row-value",fmt(it.amount)));
  const d = e("button","btn btn-icon","🗑️"); d.style.color="#e74c3c";
  d.onclick = () => { data.expenses=data.expenses.filter(x=>x.id!==it.id); saveData(data); render(); };
  rr.appendChild(d); r.appendChild(rr); return r;
}

// ── BILLS ─────────────────────────────────────────────────────────────────────
function renderBills() {
  const todayNum = new Date().getDate();
  const todayFull = today();

  const withStatus = data.bills.map(b => {
    const isPaid = b.paid && b.month===viewMonth;
    let urgent = false;
    if(!isPaid){
      if(!b.variable&&b.dayOfMonth){const diff=Number(b.dayOfMonth)-todayNum;urgent=diff>=0&&diff<=5;}
      else if(b.dueDate){const diff=(new Date(b.dueDate)-new Date(todayFull))/86400000;urgent=diff>=0&&diff<=5;}
    }
    return {...b,isPaid,urgent};
  });

  const unpaid = withStatus.filter(b=>!b.isPaid);
  const paid   = withStatus.filter(b=>b.isPaid);

  const c = card("📅 Scadenze","#8e44ad");
  const addBtn = e("button","btn-add","+ Aggiungi scadenza");
  addBtn.onclick = () => { ui.showAddBill=!ui.showAddBill; render(); };
  c.appendChild(addBtn);

  if (ui.showAddBill) {
    const fb = e("div","formbox");
    const r1 = e("div","frow");
    const sType = sel(Object.keys(BILL_ICONS),"Altro","flex:1;min-width:0");
    const iName = inp("text","Nome bolletta","","flex:2;min-width:0");
    r1.appendChild(sType); r1.appendChild(iName);
    const r2 = e("div","frow");
    const iAmt = inp("number","Importo €","","flex:1;min-width:0");
    const lbl = e("label","checkbox-label");
    const chk = document.createElement("input"); chk.type="checkbox";
    lbl.appendChild(chk); lbl.appendChild(document.createTextNode("Data variabile"));
    r2.appendChild(iAmt); r2.appendChild(lbl);
    const r3 = e("div","");
    const iDay = inp("number","Giorno del mese (es. 15)","");
    const iDate = inp("date","",""); iDate.style.display="none";
    chk.onchange = () => { iDay.style.display=chk.checked?"none":""; iDate.style.display=chk.checked?"":"none"; };
    r3.appendChild(iDay); r3.appendChild(iDate);
    const sv = e("button","btn btn-dark","✓ Salva scadenza");
    sv.onclick = () => {
      if(!iName.value||!iAmt.value) return;
      data.bills.push({id:uid(),label:iName.value,amount:Number(iAmt.value),type:sType.value,dayOfMonth:iDay.value,variable:chk.checked,dueDate:iDate.value,paid:false,month:null});
      ui.showAddBill=false; saveData(data); render();
    };
    fb.appendChild(r1); fb.appendChild(r2); fb.appendChild(r3); fb.appendChild(sv);
    c.appendChild(fb);
  }

  if(unpaid.length===0&&paid.length===0) c.appendChild(e("div","empty","Nessuna scadenza configurata"));
  if(unpaid.length===0&&paid.length>0) c.appendChild(e("div","empty","🎉 Tutto pagato questo mese!"));

  unpaid.forEach(b => c.appendChild(makeBillRow(b)));
  if(unpaid.length>0){
    const tl=e("div","total-line"); tl.innerHTML=`Da pagare: <strong>${fmt(unpaid.reduce((s,b)=>s+Number(b.amount),0))}</strong>`; c.appendChild(tl);
  }

  if(paid.length>0){
    c.appendChild(e("div","divider","✅ Pagati questo mese"));
    paid.forEach(b=>{ const w=e("div","opacity-60"); w.appendChild(makeBillRow(b)); c.appendChild(w); });
    const tl=e("div","total-line"); tl.innerHTML=`Pagati: <strong>${fmt(paid.reduce((s,b)=>s+Number(b.amount),0))}</strong>`; c.appendChild(tl);
  }

  return c;
}

function makeBillRow(b) {
  const row = e("div","bill-row"+(b.urgent?" urgent":""));
  const left = e("div",""); left.style.display="flex"; left.style.alignItems="center";
  left.appendChild(e("span","bill-icon",BILL_ICONS[b.type]||"📄"));
  const info = e("div");
  const nm = e("div","bill-name",b.label);
  if(b.urgent) nm.appendChild(e("span","badge-urgent","⚠️ In scadenza"));
  info.appendChild(nm);
  info.appendChild(e("div","bill-sub",b.variable?(b.dueDate||"Data da definire"):`Ogni ${b.dayOfMonth} del mese`));
  left.appendChild(info); row.appendChild(left);
  const right = e("div","row-right");
  right.appendChild(e("span","row-value",fmt(b.amount)));
  const payBtn = e("button","btn-pay",b.isPaid?"✓ Pagato":"Paga");
  payBtn.style.background = b.isPaid?"#27ae60":"#2c2c2c";
  payBtn.onclick = () => {
    data.bills = data.bills.map(x=>x.id===b.id?{...x,paid:!b.isPaid,month:!b.isPaid?viewMonth:null}:x);
    saveData(data); render();
  };
  const del = e("button","btn btn-icon","🗑️"); del.style.color="#e74c3c";
  del.onclick = () => { data.bills=data.bills.filter(x=>x.id!==b.id); saveData(data); render(); };
  right.appendChild(payBtn); right.appendChild(del); row.appendChild(right);
  return row;
}

// ── SHOP ──────────────────────────────────────────────────────────────────────
function renderShop() {
  const shopCats = data.shopCats || DEFAULT_SHOP_CATS;
  const firstCat = shopCats[0]?.name||"Alimentari";
  const c = card("🛒 Lista della Spesa","#e67e22");

  // Add item form
  const fb = e("div","formbox");
  const r1 = e("div","frow");
  const iItem = inp("text","Articolo…","","flex:3;min-width:0");
  iItem.onkeydown = ev => { if(ev.key==="Enter") addShopItem(); };
  const iQty = inp("number","Qtà","1","flex:1;min-width:50px");
  r1.appendChild(iItem); r1.appendChild(iQty);
  const catNames = shopCats.map(x=>x.name);
  const sCat = sel(catNames, firstCat); sCat.style.flex="1";
  const sSub = sel(["— Sottocategoria —"],"","flex:1"); sSub.style.display="none";
  const catRow = e("div","frow"); catRow.appendChild(sCat); catRow.appendChild(sSub);
  const addBtn2 = e("button","btn btn-dark","+ Aggiungi");
  function addShopItem() {
    if(!iItem.value) return;
    data.shoppingList.push({id:uid(),label:iItem.value,qty:iQty.value||"1",category:sCat.value,subcategory:sSub.value||"",checked:false});
    saveData(data); render();
  }
  addBtn2.onclick = addShopItem;
  fb.appendChild(r1); fb.appendChild(catRow); fb.appendChild(addBtn2); c.appendChild(fb);

  // Presets toggle
  const toggleBtn = e("button","toggle-presets",ui.showPresets?"▲ Nascondi lista rapida":"▼ Aggiungi da lista rapida");
  toggleBtn.onclick = () => { ui.showPresets=!ui.showPresets; render(); };
  c.appendChild(toggleBtn);

  if (ui.showPresets) {
    const pw = e("div","presets-wrap");
    data.shoppingPresets.forEach(p => {
      const btn = e("button","preset-btn",p);
      btn.onclick = () => {
        if(data.shoppingList.find(i=>i.label===p&&!i.checked)) return;
        data.shoppingList.push({id:uid(),label:p,qty:"1",category:firstCat,subcategory:"",checked:false});
        saveData(data); render();
      };
      pw.appendChild(btn);
    });
    c.appendChild(pw);
  }

  const unchecked = data.shoppingList.filter(i=>!i.checked);
  const checked   = data.shoppingList.filter(i=>i.checked);

  if(unchecked.length===0&&checked.length===0) c.appendChild(e("div","empty","La lista è vuota"));

  // Group unchecked by category
  shopCats.forEach(cat => {
    const items = unchecked.filter(i=>i.category===cat.name);
    if(!items.length) return;
    c.appendChild(e("div","shop-cat-label",cat.name));
    items.forEach(item => c.appendChild(makeShopItem(item, false)));
  });
  const uncatItems = unchecked.filter(i=>!shopCats.find(c2=>c2.name===i.category));
  if(uncatItems.length) { c.appendChild(e("div","shop-cat-label","Altro")); uncatItems.forEach(item=>c.appendChild(makeShopItem(item,false))); }

  if(checked.length>0){
    c.appendChild(e("div","divider",`✅ Nel carrello (${checked.length})`));
    checked.forEach(item=>c.appendChild(makeShopItem(item,true)));
    const clr=e("button","clear-cart","🗑️ Svuota carrello");
    clr.onclick=()=>{ data.shoppingList=data.shoppingList.filter(i=>!i.checked); saveData(data); render(); };
    c.appendChild(clr);
  }
  return c;
}

function makeShopItem(item, done) {
  const row = e("div","shop-item"+(done?" opacity-60":""));
  const chk = e("div","check-circle"+(done?" done":""),done?"✓":"");
  chk.onclick = () => { data.shoppingList=data.shoppingList.map(i=>i.id===item.id?{...i,checked:!i.checked}:i); saveData(data); render(); };
  const info = e("div",""); info.style.flex="1";
  const lbl = e("span","",`${Number(item.qty)>1?item.qty+"× ":""}${item.label}`);
  if(done) lbl.style.textDecoration="line-through";
  info.appendChild(lbl);
  if(item.subcategory){ const sub=e("div","",item.subcategory); sub.style.cssText="font-size:10px;color:#bbb"; info.appendChild(sub); }
  const del=e("button","btn btn-icon","🗑️"); del.style.color="#e74c3c";
  del.onclick=()=>{ data.shoppingList=data.shoppingList.filter(i=>i.id!==item.id); saveData(data); render(); };
  row.appendChild(chk); row.appendChild(info); row.appendChild(del); return row;
}

// ── SETTINGS ──────────────────────────────────────────────────────────────────
function renderSettings() {
  const wrap = e("div");
  wrap.appendChild(renderCatManager("📤 Categorie Spese","#e74c3c","expenseCats",true,"expandedSettingsCat"));
  wrap.appendChild(renderCatManager("🛒 Categorie Lista Spesa","#e67e22","shopCats",false,"expandedShopSettingsCat"));
  wrap.appendChild(renderPresetManager());
  return wrap;
}

function renderCatManager(title, accent, dataKey, showIcon, uiKey) {
  const cats = data[dataKey] || [];
  const c = card(title, accent);

  cats.forEach(cat => {
    const sec = e("div","settings-section");
    const row = e("div","settings-cat-row");
    const btn = e("button","settings-cat-btn");
    if(showIcon) btn.appendChild(e("span","",cat.icon+" "));
    btn.appendChild(e("span","",cat.name+" "));
    btn.appendChild(e("span","settings-cat-count",`(${(cat.subs||[]).length} sottoc.) ${ui[uiKey]===cat.id?"▲":"▼"}`));
    btn.onclick = () => { ui[uiKey]=ui[uiKey]===cat.id?null:cat.id; render(); };
    const delBtn = e("button","btn btn-icon","🗑️"); delBtn.style.color="#e74c3c";
    delBtn.onclick = () => {
      if(cats.length<=1){alert("Devi avere almeno una categoria.");return;}
      data[dataKey]=cats.filter(x=>x.id!==cat.id); saveData(data); render();
    };
    row.appendChild(btn); row.appendChild(delBtn); sec.appendChild(row);

    if(ui[uiKey]===cat.id){
      const panel = e("div","sub-panel");
      if(!(cat.subs||[]).length) panel.appendChild(e("div","no-sub","Nessuna sottocategoria"));
      (cat.subs||[]).forEach(sub=>{
        const sr=e("div","sub-row");
        sr.appendChild(e("span","","• "+sub));
        const d2=e("button","btn btn-icon","🗑️"); d2.style.color="#e74c3c";
        d2.onclick=()=>{ data[dataKey]=data[dataKey].map(x=>x.id===cat.id?{...x,subs:(x.subs||[]).filter(s=>s!==sub)}:x); saveData(data); render(); };
        sr.appendChild(d2); panel.appendChild(sr);
      });
      const ar=e("div","frow"); ar.style.marginTop="6px";
      const iSub=inp("text","Nuova sottocategoria…","","flex:1;min-width:0");
      iSub.onkeydown=ev=>{if(ev.key==="Enter"&&iSub.value.trim()){data[dataKey]=data[dataKey].map(x=>x.id===cat.id?{...x,subs:[...(x.subs||[]),iSub.value.trim()]}:x);saveData(data);render();}};
      const aBtn=e("button","btn btn-dark","+ ");
      aBtn.onclick=()=>{if(!iSub.value.trim())return;data[dataKey]=data[dataKey].map(x=>x.id===cat.id?{...x,subs:[...(x.subs||[]),iSub.value.trim()]}:x);saveData(data);render();};
      ar.appendChild(iSub); ar.appendChild(aBtn); panel.appendChild(ar);
      sec.appendChild(panel);
    }
    c.appendChild(sec);
  });

  const addSec = e("div","add-cat-section");
  addSec.appendChild(e("div","add-cat-label","Aggiungi categoria:"));
  const ar = e("div","frow");
  let iIcon;
  if(showIcon){ iIcon=inp("text","🏷️","📦","width:44px;text-align:center;padding:7px 4px;flex-shrink:0"); ar.appendChild(iIcon); }
  const iName = inp("text","Nome categoria…","","flex:1;min-width:0");
  const aBtn = e("button","btn btn-dark","+ ");
  aBtn.onclick = () => {
    if(!iName.value.trim()) return;
    data[dataKey]=[...data[dataKey],{id:uid(),name:iName.value.trim(),icon:showIcon?(iIcon.value||"📦"):"",subs:[]}];
    saveData(data); render();
  };
  iName.onkeydown = ev => { if(ev.key==="Enter") aBtn.click(); };
  ar.appendChild(iName); ar.appendChild(aBtn); addSec.appendChild(ar); c.appendChild(addSec);
  return c;
}

function renderPresetManager() {
  const c = card("⚡ Lista rapida spesa","#e67e22");
  const wrap = e("div","presets-wrap");
  data.shoppingPresets.forEach(p=>{
    const tag=e("div","preset-tag");
    tag.appendChild(e("span","",p));
    const d=e("button","preset-del","✕");
    d.onclick=()=>{data.shoppingPresets=data.shoppingPresets.filter(x=>x!==p);saveData(data);render();};
    tag.appendChild(d); wrap.appendChild(tag);
  });
  c.appendChild(wrap);
  const ar=e("div","frow");
  const iP=inp("text","Nuovo articolo rapido…","","flex:1;min-width:0");
  const aBtn=e("button","btn btn-dark","+ ");
  aBtn.onclick=()=>{if(!iP.value.trim()||data.shoppingPresets.includes(iP.value.trim()))return;data.shoppingPresets.push(iP.value.trim());saveData(data);render();};
  iP.onkeydown=ev=>{if(ev.key==="Enter")aBtn.click();};
  ar.appendChild(iP); ar.appendChild(aBtn); c.appendChild(ar);
  return c;
}

// ── Card helper ───────────────────────────────────────────────────────────────
function card(title, accent) {
  const c = e("div","card");
  c.style.borderTop=`4px solid ${accent}`;
  const t = e("div","card-title",title);
  t.style.color=accent; c.appendChild(t); return c;
}

// ── Boot ──────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
