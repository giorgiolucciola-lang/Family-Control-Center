<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Control Center</title>
<link rel="icon" type="image/png" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#9B59B6">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<style>
:root {
  --bg: #f8f5fc;
  --surface: #ffffff;
  --surface2: #f2edf8;
  --border: #e2d9f0;
  --border2: #c8b8e0;
  --accent: #9B59B6;
  --accent-light: #f0e8f8;
  --accent-dark: #7d3f9e;
  --text: #1a1520;
  --text2: #6a5878;
  --text3: #a898b8;
  --green: #27ae60;
  --green-bg: #eafaf1;
  --green-border: #a9dfbf;
  --red: #c0392b;
  --red-bg: #fdf0ee;
  --red-border: #e8b0a8;
  --orange: #e67e22;
  --orange-bg: #fef5ec;
  --radius: 10px;
  --shadow: 0 2px 8px rgba(155,89,182,0.08);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* NAV */
nav {
  background: var(--accent);
  padding: 0;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 8px rgba(155,89,182,0.3);
}
.nav-top {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 16px;
}
.nav-title { color: #fff; font-size: 17px; font-weight: 700; letter-spacing: 0.3px; }
.nav-user { color: rgba(255,255,255,0.85); font-size: 13px; display: flex; align-items: center; gap: 8px; }
.nav-tabs {
  display: flex; overflow-x: auto;
  padding: 0 8px 0;
  gap: 2px;
  scrollbar-width: none;
}
.nav-tabs::-webkit-scrollbar { display: none; }
.tab-btn {
  padding: 9px 14px; border: none; background: transparent;
  color: rgba(255,255,255,0.7); font-size: 13px; font-weight: 500;
  cursor: pointer; border-bottom: 3px solid transparent;
  white-space: nowrap; transition: all 0.2s; flex-shrink: 0;
}
.tab-btn:hover { color: #fff; }
.tab-btn.active { color: #fff; border-bottom-color: #fff; }

/* SYNC BTN */
.sync-btn {
  padding: 5px 11px; border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.5);
  background: transparent; color: #fff;
  font-size: 12px; cursor: pointer; transition: all 0.2s;
}
.sync-btn:hover { background: rgba(255,255,255,0.15); }
.sync-btn.syncing { opacity: 0.6; }

/* LAYOUT */
.section { display: none; padding: 16px; max-width: 700px; margin: 0 auto; }
.section.active { display: block; }

/* CARDS */
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; padding: 16px; margin-bottom: 12px;
  box-shadow: var(--shadow);
}
.card-title { font-size: 15px; font-weight: 600; margin-bottom: 12px; color: var(--text); }

/* FORM ELEMENTS */
.form-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
.form-row label { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text3); display: block; margin-bottom: 4px; }
.form-group { display: flex; flex-direction: column; flex: 1; min-width: 100px; }
input[type=text], input[type=number], input[type=date], select, textarea {
  padding: 9px 12px; background: var(--surface2);
  border: 1px solid var(--border); border-radius: 8px;
  color: var(--text); font-size: 15px; font-family: inherit;
  outline: none; width: 100%; transition: border-color 0.2s;
}
input:focus, select:focus, textarea:focus { border-color: var(--accent); background: #fff; }

/* BUTTONS */
.btn {
  padding: 8px 16px; border-radius: 8px;
  border: 1px solid var(--border2); background: var(--surface);
  color: var(--text); font-size: 14px; font-weight: 500;
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.btn:hover { border-color: var(--accent); color: var(--accent); }
.btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn.primary:hover { background: var(--accent-dark); border-color: var(--accent-dark); }
.btn.danger { border-color: var(--red-border); color: var(--red); }
.btn.danger:hover { background: var(--red-bg); }
.btn.small { padding: 4px 10px; font-size: 12px; }

/* BUDGET TAB */
.budget-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px; flex-wrap: wrap; gap: 8px;
}
.month-nav { display: flex; align-items: center; gap: 8px; }
.month-nav button { background: none; border: 1px solid var(--border2); border-radius: 6px; padding: 4px 10px; cursor: pointer; font-size: 16px; color: var(--text2); }
.month-nav button:hover { border-color: var(--accent); color: var(--accent); }
.month-label { font-size: 16px; font-weight: 600; min-width: 140px; text-align: center; }

.summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
.summary-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 14px 12px; text-align: center;
  box-shadow: var(--shadow);
}
.summary-card .label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text3); margin-bottom: 6px; }
.summary-card .amount { font-size: 20px; font-weight: 700; }
.summary-card.entrate .amount { color: var(--green); }
.summary-card.uscite .amount { color: var(--red); }
.summary-card.saldo .amount { color: var(--accent); }

/* SPESE per giorno */
.day-group { margin-bottom: 18px; }
.day-header {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 12px;
  background: var(--accent);
  color: #fff;
  border-radius: 10px;
  margin-bottom: 8px;
  font-size: 13px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.08em;
}
.day-header .day-total {
  margin-left: auto;
  font-size: 13px; font-weight: 700;
  opacity: 0.9;
}
.spesa-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  margin-bottom: 6px;
  font-size: 14px;
}
.spesa-cat { font-size: 11px; color: var(--text3); }
.spesa-desc { flex: 1; font-weight: 500; }
.spesa-amount { font-weight: 700; color: var(--red); white-space: nowrap; }
.spesa-delete { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 16px; padding: 2px 4px; border-radius: 4px; }
.spesa-delete:hover { color: var(--red); background: var(--red-bg); }

.add-spesa-form {
  background: var(--accent-light); border: 1px solid var(--border2);
  border-radius: 12px; padding: 14px; margin-bottom: 16px;
}

/* SCADENZE */
.scad-item {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px; background: var(--surface);
  border: 1px solid var(--border); border-radius: 10px;
  margin-bottom: 8px;
}
.scad-item.pagato { opacity: 0.55; }
.scad-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.scad-dot.verde { background: var(--green); }
.scad-dot.arancio { background: var(--orange); }
.scad-dot.rosso { background: var(--red); }
.scad-info { flex: 1; }
.scad-name { font-size: 14px; font-weight: 600; }
.scad-date { font-size: 12px; color: var(--text3); }
.scad-amount { font-weight: 700; font-size: 15px; }

/* SPESA (lista) */
.spesa-lista-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; background: var(--surface);
  border: 1px solid var(--border); border-radius: 8px;
  margin-bottom: 6px;
}
.spesa-lista-item.checked { opacity: 0.5; text-decoration: line-through; }
.spesa-lista-item input[type=checkbox] { width: 18px; height: 18px; cursor: pointer; accent-color: var(--accent); }

/* REPORT */
.report-cat-bar { margin-bottom: 10px; }
.report-cat-label { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 4px; }
.bar-bg { height: 8px; background: var(--border); border-radius: 4px; }
.bar-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width 0.5s; }

/* IMPOSTAZIONI */
.setting-section { margin-bottom: 20px; }
.setting-label { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text3); margin-bottom: 10px; }
.cat-chip {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 20px; padding: 4px 10px; margin: 4px;
  font-size: 13px;
}
.cat-chip button { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 14px; line-height: 1; }
.cat-chip button:hover { color: var(--red); }

/* LOGIN */
.login-screen {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; min-height: 80vh; gap: 20px; padding: 24px;
  text-align: center;
}
.login-title { font-size: 28px; font-weight: 700; color: var(--accent); }
.login-sub { color: var(--text2); font-size: 15px; max-width: 300px; }
.btn-google {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 24px; border-radius: 10px;
  border: 1px solid var(--border2); background: var(--surface);
  font-size: 15px; font-weight: 600; cursor: pointer;
  box-shadow: var(--shadow); transition: all 0.2s;
}
.btn-google:hover { box-shadow: 0 4px 16px rgba(155,89,182,0.15); border-color: var(--accent); }

.empty { text-align: center; color: var(--text3); padding: 32px 16px; font-size: 14px; }
.badge-entrata { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); border-radius: 5px; font-size: 11px; font-weight: 600; padding: 2px 6px; }
.badge-uscita { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); border-radius: 5px; font-size: 11px; font-weight: 600; padding: 2px 6px; }

/* Entrate list */
.entrata-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; background: var(--green-bg);
  border: 1px solid var(--green-border); border-radius: 8px;
  margin-bottom: 6px;
}
.entrata-item .spesa-desc { color: var(--green); }
.entrata-item .spesa-amount { color: var(--green); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ── FIREBASE CONFIG ────────────────────────────────────────────────────────────
// ⚠️ SOSTITUISCI questi valori con le tue credenziali Firebase
// Le trovi su: console.firebase.google.com → Il tuo progetto → Impostazioni → Le tue app
const firebaseConfig = {
  apiKey: "AIzaSyDWcRC7Zf8NX2OJU197UVvZ23Gy6_SWQtw",
  authDomain: "family-control-center-4ae38.firebaseapp.com",
  projectId: "family-control-center-4ae38",
  storageBucket: "family-control-center-4ae38.firebasestorage.app",
  messagingSenderId: "722999772560",
  appId: "1:722999772560:web:f06617ba41dee3f9ebdf15"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
const provider = new firebase.auth.GoogleAuthProvider();

// ── UTILS ──────────────────────────────────────────────────────────────────────
function localDateStr(date = new Date()) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const d = String(date.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}
function formatEuro(n) {
  return '€ ' + Number(n || 0).toFixed(2).replace('.', ',');
}
function monthLabel(y, m) {
  return new Date(y, m - 1, 1).toLocaleDateString('it-IT', { month: 'long', year: 'numeric' });
}
function dayLabel(dateStr) {
  const [y, m, d] = dateStr.split('-').map(Number);
  const date = new Date(y, m - 1, d);
  const today = new Date(); today.setHours(0,0,0,0);
  const diff = Math.round((today - date) / 86400000);
  if (diff === 0) return 'Oggi';
  if (diff === 1) return 'Ieri';
  return date.toLocaleDateString('it-IT', { weekday: 'long', day: 'numeric', month: 'long' });
}
function scadenzaColor(dateStr) {
  const [y, m, d] = dateStr.split('-').map(Number);
  const date = new Date(y, m - 1, d);
  const today = new Date(); today.setHours(0,0,0,0);
  const diff = Math.round((date - today) / 86400000);
  if (diff < 0) return 'rosso';
  if (diff <= 5) return 'arancio';
  return 'verde';
}

// ── DEFAULT DATA ───────────────────────────────────────────────────────────────
const DEFAULT_CATS = ['Casa', 'Cibo', 'Trasporti', 'Salute', 'Svago', 'Abbigliamento', 'Altro'];
const DEFAULT_SPESA_CATS = ['Frutta e Verdura', 'Carne e Pesce', 'Latticini', 'Pane e Cereali', 'Bevande', 'Pulizia', 'Altro'];

// ── MAIN APP ───────────────────────────────────────────────────────────────────
function App() {
  const [user, setUser] = useState(null);
  const [loading, setLoading] = useState(true);
  const [tab, setTab] = useState('budget');
  const [syncing, setSyncing] = useState(false);
  const [data, setData] = useState(null);

  useEffect(() => {
    const timeout = setTimeout(() => setLoading(false), 6000);
    const unsub = auth.onAuthStateChanged(u => {
      clearTimeout(timeout);
      setUser(u || null);
      setLoading(false);
    }, () => {
      clearTimeout(timeout);
      setLoading(false);
    });
    return () => { unsub(); clearTimeout(timeout); };
  }, []);

  useEffect(() => {
    if (!user) return;
    const ref = db.collection('fcc').doc(user.uid);
    const unsub = ref.onSnapshot(snap => {
      if (snap.exists) {
        setData(snap.data());
      } else {
        const init = {
          spese: [],
          entrate: [],
          scadenze: [],
          listaSpesa: [],
          categorie: DEFAULT_CATS,
          categorieLista: DEFAULT_SPESA_CATS,
          budgetMensile: 2000,
        };
        ref.set(init);
        setData(init);
      }
    });
    return unsub;
  }, [user]);

  async function saveData(newData) {
    if (!user) return;
    const merged = { ...data, ...newData };
    setData(merged);
    setSyncing(true);
    try {
      await db.collection('fcc').doc(user.uid).set(merged);
    } finally {
      setSyncing(false);
    }
  }

  function login() { auth.signInWithPopup(provider); }
  function logout() { auth.signOut(); setData(null); }

  if (loading) return <div style={{textAlign:'center',padding:'60px',color:'var(--text3)'}}>Caricamento...</div>;

  if (!user) return (
    <div className="login-screen">
      <div style={{fontSize:'48px'}}>💜</div>
      <div className="login-title">Family Control Center</div>
      <div className="login-sub">Accedi per gestire budget, spese, scadenze e lista della spesa</div>
      <button className="btn-google" onClick={login}>
        <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Accedi con Google
      </button>
    </div>
  );

  if (!data && user) return <div style={{textAlign:'center',padding:'60px',color:'var(--text3)'}}>Caricamento dati...</div>;

  const tabs = [
    { id: 'budget', label: '💰 Budget' },
    { id: 'scadenze', label: '📅 Scadenze' },
    { id: 'spesa', label: '🛒 Spesa' },
    { id: 'report', label: '📊 Report' },
    { id: 'impostazioni', label: '⚙️ Impostazioni' },
  ];

  return (
    <div>
      <nav>
        <div className="nav-top">
          <div className="nav-title">💜 Family CC</div>
          <div className="nav-user">
            <span style={{display:'none',fontSize:'12px'}}>{user.displayName?.split(' ')[0]}</span>
            <button className={`sync-btn${syncing?' syncing':''}`} onClick={logout}>
              {syncing ? '🔄 Sync...' : '☁️ Esci'}
            </button>
          </div>
        </div>
        <div className="nav-tabs">
          {tabs.map(t => (
            <button key={t.id} className={`tab-btn${tab===t.id?' active':''}`} onClick={() => setTab(t.id)}>
              {t.label}
            </button>
          ))}
        </div>
      </nav>

      {tab === 'budget' && <BudgetTab data={data} saveData={saveData} />}
      {tab === 'scadenze' && <ScadenzeTab data={data} saveData={saveData} />}
      {tab === 'spesa' && <SpesaTab data={data} saveData={saveData} />}
      {tab === 'report' && <ReportTab data={data} />}
      {tab === 'impostazioni' && <ImpostazioniTab data={data} saveData={saveData} />}
    </div>
  );
}

// ── BUDGET TAB ─────────────────────────────────────────────────────────────────
function BudgetTab({ data, saveData }) {
  const today = new Date();
  const [year, setYear] = useState(today.getFullYear());
  const [month, setMonth] = useState(today.getMonth() + 1);
  const [showAddSpesa, setShowAddSpesa] = useState(false);
  const [showAddEntrata, setShowAddEntrata] = useState(false);
  const [form, setForm] = useState({ desc: '', amount: '', cat: '', date: localDateStr() });
  const [formE, setFormE] = useState({ desc: '', amount: '', date: localDateStr() });

  function prevMonth() {
    if (month === 1) { setMonth(12); setYear(y => y - 1); }
    else setMonth(m => m - 1);
  }
  function nextMonth() {
    if (month === 12) { setMonth(1); setYear(y => y + 1); }
    else setMonth(m => m + 1);
  }

  const speseMese = (data.spese || []).filter(s => {
    const [sy, sm] = s.date.split('-').map(Number);
    return sy === year && sm === month;
  });
  const entrateMese = (data.entrate || []).filter(e => {
    const [ey, em] = e.date.split('-').map(Number);
    return ey === year && em === month;
  });

  const totSpese = speseMese.reduce((a, s) => a + Number(s.amount), 0);
  const totEntrate = entrateMese.reduce((a, e) => a + Number(e.amount), 0);
  const saldo = totEntrate - totSpese;

  // Raggruppa spese per giorno, ordine cronologico inverso (giorno più recente in cima)
  const spesePorGiorno = {};
  for (const s of speseMese) {
    if (!spesePorGiorno[s.date]) spesePorGiorno[s.date] = [];
    spesePorGiorno[s.date].push(s);
  }
  // Ordina le chiavi (giorni) dal più recente al più vecchio
  const giorniOrdinati = Object.keys(spesePorGiorno).sort((a, b) => b.localeCompare(a));
  // Ordina le spese dentro ogni giorno: più recente in cima (usa id/timestamp)
  for (const g of giorniOrdinati) {
    spesePorGiorno[g].sort((a, b) => (b.id || 0) - (a.id || 0));
  }

  function addSpesa() {
    if (!form.desc || !form.amount) return;
    const s = { id: Date.now(), desc: form.desc, amount: Number(form.amount), cat: form.cat || 'Altro', date: form.date };
    saveData({ spese: [...(data.spese || []), s] });
    setForm({ desc: '', amount: '', cat: '', date: localDateStr() });
    setShowAddSpesa(false);
  }
  function deleteSpesa(id) {
    saveData({ spese: (data.spese || []).filter(s => s.id !== id) });
  }
  function addEntrata() {
    if (!formE.desc || !formE.amount) return;
    const e = { id: Date.now(), desc: formE.desc, amount: Number(formE.amount), date: formE.date };
    saveData({ entrate: [...(data.entrate || []), e] });
    setFormE({ desc: '', amount: '', date: localDateStr() });
    setShowAddEntrata(false);
  }
  function deleteEntrata(id) {
    saveData({ entrate: (data.entrate || []).filter(e => e.id !== id) });
  }

  return (
    <div className="section active">
      <div className="budget-header">
        <div className="month-nav">
          <button onClick={prevMonth}>‹</button>
          <div className="month-label">{monthLabel(year, month)}</div>
          <button onClick={nextMonth}>›</button>
        </div>
      </div>

      <div className="summary-grid">
        <div className="summary-card entrate">
          <div className="label">Entrate</div>
          <div className="amount">{formatEuro(totEntrate)}</div>
        </div>
        <div className="summary-card uscite">
          <div className="label">Uscite</div>
          <div className="amount">{formatEuro(totSpese)}</div>
        </div>
        <div className="summary-card saldo">
          <div className="label">Saldo</div>
          <div className="amount" style={{color: saldo >= 0 ? 'var(--green)' : 'var(--red)'}}>{formatEuro(saldo)}</div>
        </div>
      </div>

      {/* SPESE */}
      <div className="card">
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'12px'}}>
          <div className="card-title" style={{marginBottom:0}}>💸 Spese</div>
          <button className="btn primary small" onClick={() => setShowAddSpesa(v => !v)}>
            {showAddSpesa ? '✕ Annulla' : '+ Aggiungi'}

        </div>

        {showAddSpesa && (
          <div className="add-spesa-form">
            <div className="form-row">
              <div className="form-group" style={{flex:2}}>
                <label>Descrizione</label>
                <input type="text" placeholder="Es. Supermercato" value={form.desc} onChange={e => setForm(f => ({...f, desc: e.target.value}))} />
              </div>
              <div className="form-group">
                <label>Importo €</label>
                <input type="number" placeholder="0.00" value={form.amount} onChange={e => setForm(f => ({...f, amount: e.target.value}))} />
              </div>
            </div>
            <div className="form-row">
              <div className="form-group">
                <label>Categoria</label>
                <select value={form.cat} onChange={e => setForm(f => ({...f, cat: e.target.value}))}>
                  <option value="">Seleziona...</option>
                  {(data.categorie || DEFAULT_CATS).map(c => <option key={c}>{c}</option>)}
                </select>
              </div>
              <div className="form-group">
                <label>Data</label>
                <input type="date" value={form.date} onChange={e => setForm(f => ({...f, date: e.target.value}))} />
              </div>
            </div>
            <button className="btn primary" onClick={addSpesa}>💾 Salva spesa</button>
          </div>
        )}

        {giorniOrdinati.length === 0 && <div className="empty">Nessuna spesa questo mese</div>}

        {giorniOrdinati.map(giorno => (
          <div className="day-group" key={giorno}>
            <div className="day-header">
              <span>{dayLabel(giorno)}</span>
              <span className="day-total">
                {formatEuro(spesePorGiorno[giorno].reduce((a, s) => a + Number(s.amount), 0))}
              </span>
            </div>
            {spesePorGiorno[giorno].map(s => (
              <div className="spesa-item" key={s.id}>
                <div style={{flex:1}}>
                  <div className="spesa-desc">{s.desc}</div>
                  <div className="spesa-cat">{s.cat}</div>
                </div>
                <div className="spesa-amount">{formatEuro(s.amount)}</div>
                <button className="spesa-delete" onClick={() => deleteSpesa(s.id)}>🗑</button>
              </div>
            ))}
          </div>
        ))}
      </div>

      {/* ENTRATE */}
      <div className="card">
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'12px'}}>
          <div className="card-title" style={{marginBottom:0}}>💚 Entrate</div>
          <button className="btn small" style={{borderColor:'var(--green-border)',color:'var(--green)'}} onClick={() => setShowAddEntrata(v => !v)}>
            {showAddEntrata ? '✕ Annulla' : '+ Aggiungi'}
          </button>
        </div>

        {showAddEntrata && (
          <div className="add-spesa-form" style={{background:'var(--green-bg)',borderColor:'var(--green-border)'}}>
            <div className="form-row">
              <div className="form-group" style={{flex:2}}>
                <label>Descrizione</label>
                <input type="text" placeholder="Es. Stipendio" value={formE.desc} onChange={e => setFormE(f => ({...f, desc: e.target.value}))} />
              </div>
              <div className="form-group">
                <label>Importo €</label>
                <input type="number" placeholder="0.00" value={formE.amount} onChange={e => setFormE(f => ({...f, amount: e.target.value}))} />
              </div>
            </div>
            <div className="form-row">
              <div className="form-group">
                <label>Data</label>
                <input type="date" value={formE.date} onChange={e => setFormE(f => ({...f, date: e.target.value}))} />
              </div>
            </div>
            <button className="btn primary" style={{background:'var(--green)',borderColor:'var(--green)'}} onClick={addEntrata}>💾 Salva entrata</button>
          </div>
        )}

        {entrateMese.length === 0 && <div className="empty">Nessuna entrata questo mese</div>}
        {entrateMese.slice().sort((a,b) => b.date.localeCompare(a.date)).map(e => (
          <div className="entrata-item" key={e.id}>
            <div style={{flex:1}}>
              <div className="spesa-desc">{e.desc}</div>
              <div className="spesa-cat">{e.date}</div>
            </div>
            <div className="spesa-amount">{formatEuro(e.amount)}</div>
            <button className="spesa-delete" onClick={() => deleteEntrata(e.id)}>🗑</button>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── SCADENZE TAB ───────────────────────────────────────────────────────────────
function ScadenzeTab({ data, saveData }) {
  const [show, setShow] = useState(false);
  const [form, setForm] = useState({ nome: '', amount: '', date: '', ricorrente: false });

  function add() {
    if (!form.nome || !form.date) return;
    const s = { id: Date.now(), nome: form.nome, amount: Number(form.amount), date: form.date, ricorrente: form.ricorrente, pagato: false };
    saveData({ scadenze: [...(data.scadenze || []), s] });
    setForm({ nome: '', amount: '', date: '', ricorrente: false });
    setShow(false);
  }
  function togglePagato(id) {
    saveData({ scadenze: (data.scadenze || []).map(s => s.id === id ? {...s, pagato: !s.pagato} : s) });
  }
  function del(id) {
    saveData({ scadenze: (data.scadenze || []).filter(s => s.id !== id) });
  }

  const sorted = [...(data.scadenze || [])].sort((a, b) => a.date.localeCompare(b.date));
  const daPagare = sorted.filter(s => !s.pagato);
  const pagate = sorted.filter(s => s.pagato);

  return (
    <div className="section active">
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'16px'}}>
        <div style={{fontSize:'17px',fontWeight:'700'}}>📅 Scadenze</div>
        <button className="btn primary small" onClick={() => setShow(v => !v)}>{show ? '✕ Annulla' : '+ Aggiungi'}</button>
      </div>

      {show && (
        <div className="card" style={{background:'var(--accent-light)'}}>
          <div className="form-row">
            <div className="form-group" style={{flex:2}}>
              <label>Nome</label>
              <input type="text" placeholder="Es. Affitto" value={form.nome} onChange={e => setForm(f => ({...f, nome: e.target.value}))} />
            </div>
            <div className="form-group">
              <label>Importo €</label>
              <input type="number" placeholder="0.00" value={form.amount} onChange={e => setForm(f => ({...f, amount: e.target.value}))} />
            </div>
          </div>
          <div className="form-row">
            <div className="form-group">
              <label>Data scadenza</label>
              <input type="date" value={form.date} onChange={e => setForm(f => ({...f, date: e.target.value}))} />
            </div>
            <div className="form-group" style={{justifyContent:'flex-end',paddingBottom:'2px'}}>
              <label style={{display:'flex',alignItems:'center',gap:'6px',cursor:'pointer',marginTop:'auto'}}>
                <input type="checkbox" checked={form.ricorrente} onChange={e => setForm(f => ({...f, ricorrente: e.target.checked}))} />
                Ricorrente
              </label>
            </div>
          </div>
          <button className="btn primary" onClick={add}>💾 Salva</button>
        </div>
      )}

      {daPagare.length === 0 && pagate.length === 0 && <div className="empty">Nessuna scadenza</div>}

      {daPagare.map(s => (
        <div className="scad-item" key={s.id}>
          <div className={`scad-dot ${scadenzaColor(s.date)}`}></div>
          <div className="scad-info">
            <div className="scad-name">{s.nome} {s.ricorrente && <span style={{fontSize:'11px',color:'var(--text3)'}}>🔄</span>}</div>
            <div className="scad-date">{new Date(...s.date.split('-').map((v,i)=>i===1?v-1:Number(v))).toLocaleDateString('it-IT',{weekday:'short',day:'numeric',month:'long'})}</div>
          </div>
          <div className="scad-amount">{s.amount ? formatEuro(s.amount) : ''}</div>
          <button className="btn small" style={{borderColor:'var(--green-border)',color:'var(--green)'}} onClick={() => togglePagato(s.id)}>✓ Pagato</button>
          <button className="btn small danger" onClick={() => del(s.id)}>🗑</button>
        </div>
      ))}

      {pagate.length > 0 && (
        <div style={{marginTop:'16px'}}>
          <div style={{fontSize:'12px',fontWeight:'700',color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.07em',marginBottom:'8px'}}>✓ Pagate</div>
          {pagate.map(s => (
            <div className="scad-item pagato" key={s.id}>
              <div className="scad-dot verde"></div>
              <div className="scad-info">
                <div className="scad-name">{s.nome}</div>
                <div className="scad-date">{s.date}</div>
              </div>
              <div className="scad-amount">{s.amount ? formatEuro(s.amount) : ''}</div>
              <button className="btn small" onClick={() => togglePagato(s.id)}>↩️ Riapri</button>
              <button className="btn small danger" onClick={() => del(s.id)}>🗑</button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── SPESA TAB ──────────────────────────────────────────────────────────────────
function SpesaTab({ data, saveData }) {
  const [show, setShow] = useState(false);
  const [form, setForm] = useState({ nome: '', cat: '', qta: '1' });

  function add() {
    if (!form.nome) return;
    const item = { id: Date.now(), nome: form.nome, cat: form.cat || 'Altro', qta: form.qta || '1', checked: false };
    saveData({ listaSpesa: [...(data.listaSpesa || []), item] });
    setForm({ nome: '', cat: '', qta: '1' });
  }
  function toggle(id) {
    saveData({ listaSpesa: (data.listaSpesa || []).map(i => i.id === id ? {...i, checked: !i.checked} : i) });
  }
  function del(id) {
    saveData({ listaSpesa: (data.listaSpesa || []).filter(i => i.id !== id) });
  }
  function clearChecked() {
    saveData({ listaSpesa: (data.listaSpesa || []).filter(i => !i.checked) });
  }

  const lista = data.listaSpesa || [];
  const daPrendere = lista.filter(i => !i.checked);
  const presi = lista.filter(i => i.checked);

  // Raggruppa per categoria
  const bycat = {};
  for (const item of daPrendere) {
    if (!bycat[item.cat]) bycat[item.cat] = [];
    bycat[item.cat].push(item);
  }

  return (
    <div className="section active">
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'16px'}}>
        <div style={{fontSize:'17px',fontWeight:'700'}}>🛒 Lista della spesa</div>
        <div style={{display:'flex',gap:'6px'}}>
          {presi.length > 0 && <button className="btn small danger" onClick={clearChecked}>🗑 Rimuovi presi</button>}
          <button className="btn primary small" onClick={() => setShow(v => !v)}>{show ? '✕' : '+ Aggiungi'}</button>
        </div>
      </div>

      {show && (
        <div className="card" style={{background:'var(--accent-light)'}}>
          <div className="form-row">
            <div className="form-group" style={{flex:2}}>
              <label>Prodotto</label>
              <input type="text" placeholder="Es. Latte" value={form.nome}
                onChange={e => setForm(f => ({...f, nome: e.target.value}))}
                onKeyDown={e => e.key === 'Enter' && add()} />
            </div>
            <div className="form-group" style={{maxWidth:'70px'}}>
              <label>Qtà</label>
              <input type="text" value={form.qta} onChange={e => setForm(f => ({...f, qta: e.target.value}))} />
            </div>
          </div>
          <div className="form-row">
            <div className="form-group">
              <label>Categoria</label>
              <select value={form.cat} onChange={e => setForm(f => ({...f, cat: e.target.value}))}>
                <option value="">Seleziona...</option>
                {(data.categorieLista || DEFAULT_SPESA_CATS).map(c => <option key={c}>{c}</option>)}
              </select>
            </div>
          </div>
          <button className="btn primary" onClick={add}>➕ Aggiungi</button>
        </div>
      )}

      {lista.length === 0 && <div className="empty">Lista vuota — aggiungi qualcosa!</div>}

      {Object.entries(bycat).map(([cat, items]) => (
        <div key={cat} style={{marginBottom:'14px'}}>
          <div style={{fontSize:'12px',fontWeight:'700',color:'var(--accent)',textTransform:'uppercase',letterSpacing:'0.07em',marginBottom:'6px',paddingLeft:'4px'}}>{cat}</div>
          {items.map(item => (
            <div className={`spesa-lista-item${item.checked?' checked':''}`} key={item.id}>
              <input type="checkbox" checked={item.checked} onChange={() => toggle(item.id)} />
              <span style={{flex:1}}>{item.nome}</span>
              <span style={{color:'var(--text3)',fontSize:'13px'}}>{item.qta !== '1' ? `× ${item.qta}` : ''}</span>
              <button className="spesa-delete" onClick={() => del(item.id)}>✕</button>
            </div>
          ))}
        </div>
      ))}

      {presi.length > 0 && (
        <div style={{marginTop:'8px'}}>
          <div style={{fontSize:'12px',fontWeight:'700',color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.07em',marginBottom:'6px'}}>✓ Già presi</div>
          {presi.map(item => (
            <div className="spesa-lista-item checked" key={item.id}>
              <input type="checkbox" checked={true} onChange={() => toggle(item.id)} />
              <span style={{flex:1}}>{item.nome}</span>
              <button className="spesa-delete" onClick={() => del(item.id)}>✕</button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── REPORT TAB ─────────────────────────────────────────────────────────────────
function ReportTab({ data }) {
  const today = new Date();
  const [year, setYear] = useState(today.getFullYear());
  const [month, setMonth] = useState(today.getMonth() + 1);

  const speseMese = (data.spese || []).filter(s => {
    const [sy, sm] = s.date.split('-').map(Number);
    return sy === year && sm === month;
  });
  const totale = speseMese.reduce((a, s) => a + Number(s.amount), 0);

  const byCat = {};
  for (const s of speseMese) {
    byCat[s.cat] = (byCat[s.cat] || 0) + Number(s.amount);
  }
  const catSort = Object.entries(byCat).sort((a, b) => b[1] - a[1]);

  function prevMonth() { if (month === 1) { setMonth(12); setYear(y => y - 1); } else setMonth(m => m - 1); }
  function nextMonth() { if (month === 12) { setMonth(1); setYear(y => y + 1); } else setMonth(m => m + 1); }

  return (
    <div className="section active">
      <div className="budget-header">
        <div className="month-nav">
          <button onClick={prevMonth}>‹</button>
          <div className="month-label">{monthLabel(year, month)}</div>
          <button onClick={nextMonth}>›</button>
        </div>
      </div>

      <div className="card">
        <div className="card-title">📊 Spese per categoria</div>
        {catSort.length === 0 && <div className="empty">Nessuna spesa questo mese</div>}
        {catSort.map(([cat, amt]) => (
          <div className="report-cat-bar" key={cat}>
            <div className="report-cat-label">
              <span>{cat}</span>
              <span>{formatEuro(amt)} <span style={{color:'var(--text3)',fontSize:'12px'}}>({totale ? Math.round(amt/totale*100) : 0}%)</span></span>
            </div>
            <div className="bar-bg">
              <div className="bar-fill" style={{width: totale ? `${amt/totale*100}%` : '0%'}}></div>
            </div>
          </div>
        ))}
        {totale > 0 && (
          <div style={{marginTop:'14px',paddingTop:'12px',borderTop:'1px solid var(--border)',display:'flex',justifyContent:'space-between',fontWeight:'700'}}>
            <span>Totale</span><span style={{color:'var(--red)'}}>{formatEuro(totale)}</span>
          </div>
        )}
      </div>
    </div>
  );
}

// ── IMPOSTAZIONI TAB ───────────────────────────────────────────────────────────
function ImpostazioniTab({ data, saveData }) {
  const [newCat, setNewCat] = useState('');
  const [newCatLista, setNewCatLista] = useState('');

  function addCat() {
    if (!newCat.trim()) return;
    saveData({ categorie: [...(data.categorie || DEFAULT_CATS), newCat.trim()] });
    setNewCat('');
  }
  function delCat(c) {
    saveData({ categorie: (data.categorie || DEFAULT_CATS).filter(x => x !== c) });
  }
  function addCatLista() {
    if (!newCatLista.trim()) return;
    saveData({ categorieLista: [...(data.categorieLista || DEFAULT_SPESA_CATS), newCatLista.trim()] });
    setNewCatLista('');
  }
  function delCatLista(c) {
    saveData({ categorieLista: (data.categorieLista || DEFAULT_SPESA_CATS).filter(x => x !== c) });
  }

  return (
    <div className="section active">
      <div className="card">
        <div className="setting-section">
          <div className="setting-label">Categorie spese</div>
          <div>{(data.categorie || DEFAULT_CATS).map(c => (
            <span className="cat-chip" key={c}>{c}<button onClick={() => delCat(c)}>✕</button></span>
          ))}</div>
          <div className="form-row" style={{marginTop:'10px'}}>
            <input type="text" placeholder="Nuova categoria..." value={newCat} onChange={e => setNewCat(e.target.value)} onKeyDown={e => e.key === 'Enter' && addCat()} style={{flex:1}} />
            <button className="btn primary" onClick={addCat}>Aggiungi</button>
          </div>
        </div>

        <div className="setting-section" style={{marginTop:'20px'}}>
          <div className="setting-label">Categorie lista spesa</div>
          <div>{(data.categorieLista || DEFAULT_SPESA_CATS).map(c => (
            <span className="cat-chip" key={c}>{c}<button onClick={() => delCatLista(c)}>✕</button></span>
          ))}</div>
          <div className="form-row" style={{marginTop:'10px'}}>
            <input type="text" placeholder="Nuova categoria..." value={newCatLista} onChange={e => setNewCatLista(e.target.value)} onKeyDown={e => e.key === 'Enter' && addCatLista()} style={{flex:1}} />
            <button className="btn primary" onClick={addCatLista}>Aggiungi</button>
          </div>
        </div>
      </div>

      <div className="card" style={{marginTop:'8px'}}>
        <div className="setting-label" style={{marginBottom:'8px'}}>ℹ️ Informazioni</div>
        <div style={{fontSize:'13px',color:'var(--text2)',lineHeight:'1.6'}}>
          <p>I dati sono sincronizzati automaticamente via Firebase.</p>
          <p style={{marginTop:'6px'}}>Repository: <code style={{background:'var(--surface2)',padding:'1px 6px',borderRadius:'4px'}}>giorgiolucciola-lang/fcc</code></p>
        </div>
      </div>
    </div>
  );
}
