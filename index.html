<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Family Control Center</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:Georgia,serif;background:#f5f2ee;min-height:100vh;font-size:14px}
#app{max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:20px}
header{background:#2c2c2c;padding:14px 16px 10px;color:#fff}
.header-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.brand{display:flex;align-items:baseline;gap:8px}
.brand-name{font-size:20px;font-weight:bold}
.brand-sub{font-size:10px;color:#aaa;letter-spacing:2px;text-transform:uppercase}
.today-label{font-size:11px;color:#f0c040;margin-top:3px;letter-spacing:.5px}
.header-btns{display:flex;gap:6px;margin-top:2px;flex-wrap:wrap;justify-content:flex-end}
.hbtn{background:#3a3a3a;border:none;color:#ccc;border-radius:6px;padding:6px 10px;cursor:pointer;display:flex;align-items:center;gap:4px;font-size:11px;font-family:Georgia,serif}
.hbtn.sync-ok{background:#1a6b3c;color:#fff}
.hbtn.sync-err{background:#7b1c1c;color:#fff}
.hbtn.syncing{background:#7a6000;color:#fff}
.month-nav{display:flex;align-items:center;justify-content:center;gap:20px;margin-top:8px}
.mnav-btn{background:transparent;border:none;color:#fff;cursor:pointer;font-size:20px;padding:4px 8px;line-height:1}
.month-label{font-size:16px;font-weight:bold;min-width:120px;text-align:center;color:#fff}
.balance{padding:14px 16px;color:#fff}
.balance-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.balance-title{font-size:11px;opacity:.85;text-transform:uppercase;letter-spacing:1px}
.balance-amount{font-size:24px;font-weight:bold;letter-spacing:-1px}
.balance-details{display:flex;gap:12px;font-size:11px;opacity:.8;flex-wrap:wrap}
nav{display:flex;background:#2c2c2c;border-bottom:2px solid #111}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:10px 4px;background:transparent;border:none;color:#888;cursor:pointer;border-bottom:3px solid transparent;font-family:Georgia,serif}
.tab-btn.active{color:#fff;border-bottom:3px solid #f0c040}
.tab-icon{font-size:18px}
.tab-label{text-transform:uppercase;letter-spacing:1px;font-size:9px}
main{padding:14px 10px}
.card{background:#fff;border-radius:12px;padding:14px;box-shadow:0 2px 12px rgba(0,0,0,.07);margin-bottom:14px}
.card-title{font-size:14px;font-weight:bold;margin-bottom:12px}
.row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid #f0ede9}
.row-left{flex:1;min-width:0}
.row-main{font-size:13px;color:#333;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row-sub{font-size:11px;color:#999;margin-top:1px}
.row-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.row-value{font-size:13px;font-weight:600;color:#222}
.btn{border:none;border-radius:6px;cursor:pointer;font-family:Georgia,serif;display:flex;align-items:center;gap:4px}
.btn-dark{background:#2c2c2c;color:#fff;padding:7px 12px;font-size:12px}
.btn-icon{background:transparent;padding:4px;color:#666;font-size:16px;line-height:1}
.btn-add{display:flex;align-items:center;justify-content:center;gap:6px;background:#f5f2ee;border:1px dashed #ccc;border-radius:8px;padding:8px 14px;font-size:13px;cursor:pointer;margin-bottom:8px;width:100%;font-family:Georgia,serif}
.btn-pay{color:#fff;border:none;border-radius:6px;padding:5px 10px;font-size:11px;cursor:pointer;font-family:Georgia,serif;white-space:nowrap}
.formbox{background:#faf9f7;border-radius:8px;padding:12px;margin-top:8px;display:flex;flex-direction:column;gap:8px}
.frow{display:flex;gap:8px;align-items:center}
input[type=text],input[type=number],input[type=date],select{border:1px solid #ddd;border-radius:6px;padding:7px 10px;font-size:13px;background:#fff;width:100%;font-family:Georgia,serif;-webkit-appearance:none;appearance:none}
input:focus,select:focus{border-color:#8e44ad;outline:none}
input[type=checkbox]{width:16px;height:16px;cursor:pointer;flex-shrink:0}
.checkbox-label{display:flex;align-items:center;gap:6px;font-size:12px;color:#555;white-space:nowrap;cursor:pointer}
.cat-header{display:flex;justify-content:space-between;align-items:center;font-size:11px;font-weight:bold;color:#555;text-transform:uppercase;letter-spacing:1px;margin:10px 0 4px;padding-bottom:4px;border-bottom:2px solid #eee;cursor:pointer}
.cat-header-left{display:flex;align-items:center;gap:6px}
.cat-total{color:#e74c3c}
.subcat-label{font-size:10px;color:#aaa;font-style:italic;padding:2px 0 2px 8px;border-left:2px solid #f0ede9;margin-top:4px}
.shop-cat-label{font-size:11px;font-weight:bold;color:#888;text-transform:uppercase;letter-spacing:1px;margin:10px 0 4px;border-bottom:1px solid #eee;padding-bottom:2px}
.shop-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f0ede9}
.check-circle{width:24px;height:24px;border-radius:6px;border:2px solid #ccc;background:#fff;cursor:pointer;flex-shrink:0;font-size:12px;display:flex;align-items:center;justify-content:center}
.check-circle.done{border-color:#27ae60;background:#27ae60;color:#fff}
.bill-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0ede9}
.bill-row.urgent{background:#fff9e6;border-radius:8px;padding:8px;border-left:3px solid #f39c12;margin:2px 0}
.bill-icon{font-size:20px;margin-right:8px}
.bill-name{font-size:14px;font-weight:600}
.bill-sub{font-size:11px;color:#999;margin-top:2px}
.badge-urgent{font-size:10px;background:#f39c12;color:#fff;border-radius:4px;padding:2px 5px;margin-left:6px}
.empty{padding:20px 0;text-align:center;color:#aaa;font-size:13px;font-style:italic}
.divider{margin:14px 0 8px;font-size:12px;color:#888}
.total-line{margin-top:10px;font-size:13px;color:#555;text-align:right}
.presets-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.preset-btn{background:#f5f2ee;border:1px solid #ddd;border-radius:20px;padding:4px 12px;font-size:12px;cursor:pointer;color:#444;font-family:Georgia,serif}
.preset-tag{display:flex;align-items:center;gap:4px;background:#f5f2ee;border:1px solid #ddd;border-radius:20px;padding:4px 10px;font-size:12px}
.preset-del{background:transparent;border:none;cursor:pointer;color:#e74c3c;padding:0;font-size:12px;line-height:1}
.clear-cart{margin-top:10px;width:100%;background:#fdf0f0;color:#e74c3c;border:1px solid #f5c6c6;border-radius:8px;padding:8px;font-size:13px;cursor:pointer;font-family:Georgia,serif}
.toggle-presets{background:transparent;border:none;color:#888;font-size:12px;cursor:pointer;padding:6px 0;text-align:left;font-family:Georgia,serif}
.settings-section{margin-bottom:6px}
.settings-cat-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f0ede9}
.settings-cat-btn{background:transparent;border:none;cursor:pointer;display:flex;align-items:center;gap:6px;font-size:13px;color:#333;flex:1;text-align:left;font-family:Georgia,serif;font-weight:600}
.settings-cat-count{font-size:10px;color:#aaa;font-weight:normal}
.sub-panel{background:#faf9f7;border-radius:8px;padding:10px;margin-top:4px}
.sub-row{display:flex;align-items:center;justify-content:space-between;padding:3px 0;font-size:12px;color:#555}
.no-sub{font-size:12px;color:#bbb;font-style:italic;margin-bottom:6px}
.add-cat-section{margin-top:10px;border-top:1px dashed #ddd;padding-top:10px}
.add-cat-label{font-size:12px;color:#888;margin-bottom:6px}
.opacity-60{opacity:.6}

/* Sync banner */
.sync-banner{background:#1a6b3c;color:#fff;text-align:center;padding:6px;font-size:11px;letter-spacing:.5px}
.sync-banner.err{background:#c0392b}
.sync-banner.warn{background:#e67e22}

/* Login screen */
.login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;padding:30px;text-align:center;gap:16px}
.login-title{font-size:22px;font-weight:bold;color:#2c2c2c}
.login-sub{font-size:13px;color:#888;line-height:1.6;max-width:280px}
.login-btn{background:#4285f4;color:#fff;border:none;border-radius:8px;padding:12px 24px;font-size:14px;cursor:pointer;font-family:Georgia,serif;display:flex;align-items:center;gap:8px}
</style>
</head>
<body>
<div id="app"></div>

<script>
// ── Google OAuth config ───────────────────────────────────────────────────────
const CLIENT_ID = "311934534172-4npn7vbc823ppsbf25fr7rch2dedeult.apps.googleusercontent.com"; // sostituito a runtime
const SCOPES = "https://www.googleapis.com/auth/drive.appdata";
const DRIVE_FILE_NAME = "fcc_data_v2.json";

// ── Storage & Defaults ────────────────────────────────────────────────────────
const STORAGE_KEY = "fcc_data_v2";
const DEFAULT_EXPENSE_CATS = [
  {id:"casa",name:"Casa",icon:"🏠",subs:["Affitto/Mutuo","Manutenzione","Arredamento","Elettrodomestici"]},
  {id:"cibo",name:"Cibo",icon:"🍽️",subs:["Supermercato","Ristorante","Frutteria","Macelleria","Panetteria"]},
  {id:"trasporti",name:"Trasporti",icon:"🚗",subs:["Carburante","Parcheggio","Mezzi pubblici","Taxi/Uber"]},
  {id:"salute",name:"Salute",icon:"💊",subs:["Farmacia","Medico","Dentista","Esami"]},
  {id:"abbigliamento",name:"Abbigliamento",icon:"👕",subs:["Adulti","Bambini","Scarpe","Accessori"]},
  {id:"svago",name:"Svago",icon:"🎭",subs:["Cinema/Teatro","Sport","Vacanze","Hobby"]},
  {id:"istruzione",name:"Istruzione",icon:"📚",subs:["Libri","Corsi","Scuola","Università"]},
  {id:"altro",name:"Altro",icon:"📦",subs:[]},
];
const DEFAULT_SHOP_CATS = [
  {id:"alimentari",name:"Alimentari",subs:[]},{id:"pulizia",name:"Pulizia",subs:[]},
  {id:"igiene",name:"Igiene",subs:[]},{id:"frigo",name:"Frigo",subs:[]},
  {id:"freschissimi",name:"Freschissimi",subs:[]},{id:"altro",name:"Altro",subs:[]},
];
const BILL_ICONS = {Affitto:"🏠",Luce:"💡",Gas:"🔥",Acqua:"💧",Internet:"📶",Telefono:"📱",Abbonamento:"📺",Assicurazione:"🛡️",Mutuo:"🏦",Altro:"📄"};
const MONTHS = ["Gen","Feb","Mar","Apr","Mag","Giu","Lug","Ago","Set","Ott","Nov","Dic"];
const DAYS = ["Domenica","Lunedì","Martedì","Mercoledì","Giovedì","Venerdì","Sabato"];
const defaultData = {
  monthlyIncome:0,extraIncomes:[],expenses:[],bills:[],shoppingList:[],
  shoppingPresets:["Latte","Pane","Uova","Pasta","Riso","Acqua","Frutta","Verdura","Carne","Pesce","Olio","Sale","Zucchero","Caffè","Detersivo","Carta igienica"],
  expenseCats:DEFAULT_EXPENSE_CATS,shopCats:DEFAULT_SHOP_CATS,
};

function loadLocal() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return JSON.parse(JSON.stringify(defaultData));
    const p = JSON.parse(raw);
    return {...JSON.parse(JSON.stringify(defaultData)),...p,
      expenseCats:p.expenseCats||DEFAULT_EXPENSE_CATS,
      shopCats:p.shopCats||DEFAULT_SHOP_CATS};
  } catch { return JSON.parse(JSON.stringify(defaultData)); }
}
function saveLocal(d) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch {} }

// ── Helpers ───────────────────────────────────────────────────────────────────
const uid = () => Math.random().toString(36).slice(2);
const fmt = n => "€ " + Number(n||0).toLocaleString("it-IT",{minimumFractionDigits:2,maximumFractionDigits:2});
const localYMD = d => { const dd=d||new Date(); return `${dd.getFullYear()}-${String(dd.getMonth()+1).padStart(2,"0")}-${String(dd.getDate()).padStart(2,"0")}`; };
const today = () => localYMD();
const currentYM = () => localYMD().slice(0,7);
const shiftYM = (ym,dir) => { const [y,m]=ym.split("-").map(Number); const d=new Date(y,m-1+dir,1); return localYMD(d).slice(0,7); };
const monthLabel = ym => { const [y,m]=ym.split("-"); return `${MONTHS[parseInt(m)-1]} ${y}`; };
const todayLabel = () => { const d=new Date(); return `${DAYS[d.getDay()]} ${d.getDate()} ${MONTHS[d.getMonth()]} ${d.getFullYear()}`; };
const el = (tag,cls,html) => { const e=document.createElement(tag); if(cls) e.className=cls; if(html!==undefined) e.innerHTML=html; return e; };
const inp = (type,ph,val,style) => { const i=document.createElement("input"); i.type=type; i.placeholder=ph||""; i.value=val||""; if(style) i.style.cssText=style; return i; };
const sel = (opts,val,style) => { const s=document.createElement("select"); if(style) s.style.cssText=style; opts.forEach(o=>{ const op=document.createElement("option"); op.value=o; op.textContent=o; if(o===val) op.selected=true; s.appendChild(op); }); return s; };

// ── App State ─────────────────────────────────────────────────────────────────
let data = loadLocal();
let currentTab = "budget";
let viewMonth = currentYM();
let accessToken = localStorage.getItem("fcc_gtoken") || null;
let driveFileId = localStorage.getItem("fcc_gfile") || null;
let syncStatus = "idle"; // idle | syncing | ok | error
let lastSyncTime = localStorage.getItem("fcc_gsync") || null;
let syncTimeout = null;
let ui = {
  editIncome:false,showAddExp:false,showAddBill:false,showPresets:false,
  expandedExpCats:{},expandedSettingsCat:null,expandedShopSettingsCat:null,
};

// ── Google Drive Sync ─────────────────────────────────────────────────────────
function getClientId() {
  // Client ID injected at build time
  return window.GCC_CLIENT_ID || "";
}

function startGoogleLogin() {
  const clientId = getClientId();
  if (!clientId) { alert("Client ID Google non configurato."); return; }
  const redirectUri = encodeURIComponent(location.origin + location.pathname);
  const scope = encodeURIComponent(SCOPES);
  const url = `https://accounts.google.com/o/oauth2/v2/auth?client_id=${clientId}&redirect_uri=${redirectUri}&response_type=token&scope=${scope}&prompt=select_account`;
  location.href = url;
}

function handleOAuthCallback() {
  const hash = location.hash;
  if (!hash) return false;
  const params = new URLSearchParams(hash.substring(1));
  const token = params.get("access_token");
  if (!token) return false;
  accessToken = token;
  localStorage.setItem("fcc_gtoken", token);
  history.replaceState(null, "", location.pathname);
  return true;
}

async function driveRequest(method, url, body) {
  const headers = { "Authorization": "Bearer " + accessToken };
  if (body && typeof body === "string") headers["Content-Type"] = "application/json";
  const res = await fetch(url, { method, headers, body: body || undefined });
  if (res.status === 401) { accessToken = null; localStorage.removeItem("fcc_gtoken"); render(); throw new Error("Token scaduto"); }
  return res;
}

async function findDriveFile() {
  const res = await driveRequest("GET", "https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name%3D%27" + DRIVE_FILE_NAME + "%27&fields=files(id,name)");
  const json = await res.json();
  return json.files && json.files.length > 0 ? json.files[0].id : null;
}

async function readDriveFile(fileId) {
  const res = await driveRequest("GET", `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`);
  return await res.json();
}

async function writeDriveFile(fileId, content) {
  const body = JSON.stringify(content);
  if (fileId) {
    await driveRequest("PATCH",
      `https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`,
      body);
  } else {
    const meta = JSON.stringify({ name: DRIVE_FILE_NAME, parents: ["appDataFolder"] });
    const boundary = "fcc_boundary";
    const multipart = `--${boundary}\r\nContent-Type: application/json\r\n\r\n${meta}\r\n--${boundary}\r\nContent-Type: application/json\r\n\r\n${body}\r\n--${boundary}--`;
    const res = await fetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart", {
      method: "POST",
      headers: {
        "Authorization": "Bearer " + accessToken,
        "Content-Type": `multipart/related; boundary=${boundary}`,
      },
      body: multipart,
    });
    const json = await res.json();
    driveFileId = json.id;
    localStorage.setItem("fcc_gfile", driveFileId);
  }
}

async function syncFromDrive() {
  if (!accessToken) return;
  syncStatus = "syncing"; render();
  try {
    let fileId = driveFileId || await findDriveFile();
    if (fileId) {
      driveFileId = fileId;
      localStorage.setItem("fcc_gfile", fileId);
      const remote = await readDriveFile(fileId);
      data = {...JSON.parse(JSON.stringify(defaultData)),...remote,
        expenseCats:remote.expenseCats||DEFAULT_EXPENSE_CATS,
        shopCats:remote.shopCats||DEFAULT_SHOP_CATS};
      saveLocal(data);
    }
    syncStatus = "ok";
    lastSyncTime = new Date().toLocaleTimeString("it-IT",{hour:"2-digit",minute:"2-digit"});
    localStorage.setItem("fcc_gsync", lastSyncTime);
  } catch(e) {
    console.error(e);
    syncStatus = "error";
  }
  render();
}

function scheduleSave() {
  if (syncTimeout) clearTimeout(syncTimeout);
  syncTimeout = setTimeout(saveToDrive, 1500);
}

async function saveToDrive() {
  if (!accessToken) return;
  syncStatus = "syncing"; renderSyncStatus();
  try {
    let fileId = driveFileId || await findDriveFile();
    await writeDriveFile(fileId, data);
    syncStatus = "ok";
    lastSyncTime = new Date().toLocaleTimeString("it-IT",{hour:"2-digit",minute:"2-digit"});
    localStorage.setItem("fcc_gsync", lastSyncTime);
  } catch(e) {
    console.error(e);
    syncStatus = "error";
  }
  renderSyncStatus();
}

function renderSyncStatus() {
  const btn = document.getElementById("sync-btn");
  if (!btn) return;
  if (syncStatus === "syncing") { btn.className="hbtn syncing"; btn.textContent="⟳ Sincron…"; }
  else if (syncStatus === "ok") { btn.className="hbtn sync-ok"; btn.textContent="✓ Sync "+lastSyncTime; }
  else if (syncStatus === "error") { btn.className="hbtn sync-err"; btn.textContent="✗ Errore sync"; }
  else { btn.className="hbtn"; btn.textContent="☁ Drive"; }
}

function update(fn) {
  fn(data);
  saveLocal(data);
  scheduleSave();
  render();
}

// ── Derived ───────────────────────────────────────────────────────────────────
function derived() {
  const monthExpenses = data.expenses.filter(e => e.date && e.date.startsWith(viewMonth));
  const monthBillsPaid = data.bills.filter(b => b.paid && b.month === viewMonth);
  const monthExtras = data.extraIncomes.filter(e => e.month === viewMonth);
  const totalIncome = data.monthlyIncome + monthExtras.reduce((s,e)=>s+Number(e.amount),0);
  const totalSpent  = monthExpenses.reduce((s,e)=>s+Number(e.amount),0);
  const totalBills  = monthBillsPaid.reduce((s,b)=>s+Number(b.amount),0);
  const balance     = totalIncome - totalSpent - totalBills;
  return {monthExpenses,monthBillsPaid,monthExtras,totalIncome,totalSpent,totalBills,balance};
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";
  app.appendChild(renderHeader());
  if (!accessToken) {
    app.appendChild(renderLoginPrompt());
    return;
  }
  app.appendChild(renderBalance());
  app.appendChild(renderTabs());
  const main = el("main","");
  if (currentTab==="budget") main.appendChild(renderBudget());
  else if (currentTab==="bills") main.appendChild(renderBills());
  else if (currentTab==="shop") main.appendChild(renderShop());
  else if (currentTab==="settings") main.appendChild(renderSettings());
  app.appendChild(main);
}

function renderLoginPrompt() {
  const d = el("div","login-screen");
  d.appendChild(el("div","","🏡"));
  d.querySelector("div").style.fontSize="48px";
  d.appendChild(el("div","login-title","Family Control Center"));
  d.appendChild(el("div","login-sub","Connetti il tuo account Google per sincronizzare i dati automaticamente tra iPhone e Mac."));
  const btn = el("button","login-btn","🔑 Accedi con Google");
  btn.onclick = startGoogleLogin;
  d.appendChild(btn);
  const skip = el("button","","Continua senza sincronizzazione");
  skip.style.cssText="background:transparent;border:none;color:#aaa;font-size:12px;cursor:pointer;margin-top:4px;font-family:Georgia,serif";
  skip.onclick = () => { accessToken = "local_only"; render(); };
  d.appendChild(skip);
  return d;
}

function renderHeader() {
  const hdr = el("header");
  const top = el("div","header-top");
  const left = el("div");
  const brand = el("div","brand");
  brand.appendChild(el("span","brand-name","🏡 Family"));
  brand.appendChild(el("span","brand-sub","Control Center"));
  left.appendChild(brand);
  left.appendChild(el("div","today-label",todayLabel()));
  top.appendChild(left);
  const btns = el("div","header-btns");
  if (accessToken && accessToken !== "local_only") {
    const sb = el("button","hbtn","☁ Drive"); sb.id="sync-btn";
    sb.onclick = syncFromDrive;
    renderSyncStatus();
    btns.appendChild(sb);
    const logoutBtn = el("button","hbtn","↩ Esci");
    logoutBtn.onclick = () => { accessToken=null; localStorage.removeItem("fcc_gtoken"); render(); };
    btns.appendChild(logoutBtn);
  } else if (accessToken === "local_only") {
    const loginBtn = el("button","hbtn","☁ Connetti Drive");
    loginBtn.onclick = startGoogleLogin;
    btns.appendChild(loginBtn);
  }
  top.appendChild(btns);
  hdr.appendChild(top);
  const nav = el("div","month-nav");
  const prev = el("button","mnav-btn","‹"); prev.onclick=()=>{viewMonth=shiftYM(viewMonth,-1);render();};
  const lbl = el("span","month-label",monthLabel(viewMonth));
  const next = el("button","mnav-btn","›"); next.onclick=()=>{viewMonth=shiftYM(viewMonth,+1);render();};
  nav.appendChild(prev); nav.appendChild(lbl); nav.appendChild(next);
  hdr.appendChild(nav);
  return hdr;
}

function renderBalance() {
  const {totalIncome,totalSpent,totalBills,balance} = derived();
  const div = el("div","balance");
  div.style.background = balance>=0 ? "linear-gradient(135deg,#1a6b3c,#27ae60)" : "linear-gradient(135deg,#7b1c1c,#c0392b)";
  const top = el("div","balance-top");
  top.appendChild(el("span","balance-title","Saldo disponibile"));
  top.appendChild(el("span","balance-amount",fmt(balance)));
  div.appendChild(top);
  const det = el("div","balance-details");
  det.appendChild(el("span","","Entrate "+fmt(totalIncome)));
  det.appendChild(el("span","","· Spese "+fmt(totalSpent)));
  det.appendChild(el("span","","· Bollette "+fmt(totalBills)));
  div.appendChild(det);
  return div;
}

function renderTabs() {

}

// ── BUDGET ────────────────────────────────────────────────────────────────────
function renderBudget() {
  const {monthExpenses,monthExtras,totalIncome} = derived();
  const cats = data.expenseCats || DEFAULT_EXPENSE_CATS;
  const frag = document.createDocumentFragment();
  const incCard = card("💰 Entrate","#27ae60");
  const fixRow = el("div","row");
  const fl = el("div","row-left"); fl.appendChild(el("div","row-main","Stipendio fisso")); fixRow.appendChild(fl);
  const fr = el("div","row-right");
  fr.appendChild(el("span","row-value",fmt(data.monthlyIncome)));
  const editBtn = el("button","btn btn-icon","✏️");
  editBtn.onclick = () => { ui.editIncome=!ui.editIncome; render(); };
  fr.appendChild(editBtn); fixRow.appendChild(fr); incCard.appendChild(fixRow);
  if (ui.editIncome) {
    const fb = el("div","formbox"); fb.style.marginTop="8px";

    const sv = el("button","btn btn-dark","✓ Salva");
    sv.onclick = () => { update(d=>{d.monthlyIncome=Number(iInc.value||0);}); ui.editIncome=false; render(); };
    row.appendChild(iInc); row.appendChild(sv); fb.appendChild(row); incCard.appendChild(fb);
  }
  monthExtras.forEach(ex => {
    const r = el("div","row");
    const l = el("div","row-left"); l.appendChild(el("div","row-main",ex.label)); r.appendChild(l);
    const rr = el("div","row-right");
    rr.appendChild(el("span","row-value",fmt(ex.amount)));
    const d2 = el("button","btn btn-icon","🗑️"); d2.style.color="#e74c3c";
    d2.onclick = () => update(d=>{d.extraIncomes=d.extraIncomes.filter(x=>x.id!==ex.id);});
    rr.appendChild(d2); r.appendChild(rr); incCard.appendChild(r);
  });
  const addExtraBox = el("div","formbox"); addExtraBox.style.marginTop="8px";
  const er = el("div","frow");
  const iLabel = inp("text","Entrata extra…","","flex:2;min-width:0");
  const iAmt = inp("number","€","","flex:1;min-width:60px");
  const addBtn = el("button","btn btn-dark","+ Aggiungi");
  addBtn.onclick = () => { if(!iLabel.value||!iAmt.value) return; update(d=>{d.extraIncomes.push({id:uid(),label:iLabel.value,amount:Number(iAmt.value),month:viewMonth});}); };
  er.appendChild(iLabel); er.appendChild(iAmt); er.appendChild(addBtn);
  addExtraBox.appendChild(er); incCard.appendChild(addExtraBox);
  const tl = el("div","total-line"); tl.innerHTML=`Totale entrate: <strong>${fmt(totalIncome)}</strong>`; incCard.appendChild(tl);
  frag.appendChild(incCard);

  const expCard = card("📤 Spese","#e74c3c");
  const addExpBtn = el("button","btn-add","+ Aggiungi spesa");
  addExpBtn.onclick = () => { ui.showAddExp=!ui.showAddExp; render(); };
  expCard.appendChild(addExpBtn);
  if (ui.showAddExp) {
    const fb = el("div","formbox");
    const iDesc = inp("text","Descrizione (es. Frutteria)","");
    const r1 = el("div","frow");
    const iAmt = inp("number","€","","flex:1;min-width:0");
    const iDate = inp("date","",today(),"flex:1;min-width:0");
    r1.appendChild(iAmt); r1.appendChild(iDate);
    const catNames = cats.map(c=>c.name);
    const sCat = sel(catNames,catNames[0]); sCat.style.flex="1";
    const sSub = sel(["— Sottocategoria —"],"","flex:1");
    const updateSubs = () => {
      const c = cats.find(x=>x.name===sCat.value);
      sSub.innerHTML="";
      const defOpt = document.createElement("option"); defOpt.value=""; defOpt.textContent="— Sottocategoria —"; sSub.appendChild(defOpt);
      if(c&&c.subs&&c.subs.length){c.subs.forEach(s=>{const o=document.createElement("option");o.value=s;o.textContent=s;sSub.appendChild(o);});sSub.style.display="";}
      else sSub.style.display="none";
    };
    sCat.onchange=updateSubs; updateSubs();
    const catRow = el("div","frow"); catRow.appendChild(sCat); catRow.appendChild(sSub);
    const sv = el("button","btn btn-dark","✓ Salva spesa");
    sv.onclick = () => {
      if(!iDesc.value||!iAmt.value) return;
      update(d=>{d.expenses.push({id:uid(),label:iDesc.value,amount:Number(iAmt.value),date:iDate.value,category:sCat.value,subcategory:sSub.value||""});});
      ui.showAddExp=false;
    };
    fb.appendChild(iDesc); fb.appendChild(r1); fb.appendChild(catRow); fb.appendChild(sv);
    expCard.appendChild(fb);
  }
  const byCategory = cats.map(c=>({cat:c.name,icon:c.icon,items:monthExpenses.filter(x=>x.category===c.name),total:monthExpenses.filter(x=>x.category===c.name).reduce((s,x)=>s+Number(x.amount),0)})).filter(g=>g.items.length>0);
  if(byCategory.length===0) expCard.appendChild(el("div","empty","Nessuna spesa questo mese"));
  byCategory.forEach(g => {
    const expanded = ui.expandedExpCats[g.cat]!==false;
    const ch = el("div","cat-header");
    const cl = el("div","cat-header-left");
    cl.appendChild(el("span","",g.icon+" "+g.cat+" ("+g.items.length+")"));
    const cr = el("div",""); cr.style.cssText="display:flex;align-items:center;gap:6px";
    cr.appendChild(el("span","cat-total",fmt(g.total))); cr.appendChild(el("span","",expanded?"▲":"▼"));
    ch.appendChild(cl); ch.appendChild(cr);
    ch.onclick = () => { ui.expandedExpCats[g.cat]=!expanded; render(); };
    expCard.appendChild(ch);
    if (expanded) {
      const bySub = {};
      g.items.forEach(it=>{const s=it.subcategory||"—";if(!bySub[s])bySub[s]=[];bySub[s].push(it);});
      const hasSubs = Object.keys(bySub).some(s=>s!=="—")||Object.keys(bySub).length>1;
      if(hasSubs){Object.entries(bySub).forEach(([sub,items])=>{if(sub!=="—")expCard.appendChild(el("div","subcat-label",sub));items.forEach(it=>expCard.appendChild(makeExpRow(it)));});}
      else g.items.forEach(it=>expCard.appendChild(makeExpRow(it)));

  if(byCategory.length>0){const tl2=el("div","total-line");tl2.innerHTML=`Totale spese: <strong style="color:#e74c3c">${fmt(monthExpenses.reduce((s,x)=>s+Number(x.amount),0))}</strong>`;expCard.appendChild(tl2);}
  frag.appendChild(expCard);
  const wrap = el("div"); wrap.appendChild(frag); return wrap;
}

function makeExpRow(it) {
  const r = el("div","row");
  const l = el("div","row-left"); l.appendChild(el("div","row-main",it.label)); l.appendChild(el("div","row-sub",it.date||"")); r.appendChild(l);
  const rr = el("div","row-right"); rr.appendChild(el("span","row-value",fmt(it.amount)));
  const d = el("button","btn btn-icon","🗑️"); d.style.color="#e74c3c";
  d.onclick = () => update(dd=>{dd.expenses=dd.expenses.filter(x=>x.id!==it.id);});
  rr.appendChild(d); r.appendChild(rr); return r;
}

// ── BILLS ─────────────────────────────────────────────────────────────────────
function renderBills() {
  const todayNum=new Date().getDate(), todayFull=today();
  const withStatus = data.bills.map(b=>{
    const isPaid=b.paid&&b.month===viewMonth; let urgent=false;
    if(!isPaid){if(!b.variable&&b.dayOfMonth){const diff=Number(b.dayOfMonth)-todayNum;urgent=diff>=0&&diff<=5;}else if(b.dueDate){const diff=(new Date(b.dueDate)-new Date(todayFull))/86400000;urgent=diff>=0&&diff<=5;}}
    return {...b,isPaid,urgent};
  });
  const unpaid=withStatus.filter(b=>!b.isPaid), paid=withStatus.filter(b=>b.isPaid);
  const c = card("📅 Scadenze","#8e44ad");
  const addBtn = el("button","btn-add","+ Aggiungi scadenza");
  addBtn.onclick = () => { ui.showAddBill=!ui.showAddBill; render(); };
  c.appendChild(addBtn);
  if(ui.showAddBill){
    const fb=el("div","formbox");
    const r1=el("div","frow"); const sType=sel(Object.keys(BILL_ICONS),"Altro","flex:1;min-width:0"); const iName=inp("text","Nome bolletta","","flex:2;min-width:0"); r1.appendChild(sType); r1.appendChild(iName);
    const r2=el("div","frow"); const iAmt=inp("number","Importo €","","flex:1;min-width:0"); const lbl=el("label","checkbox-label"); const chk=document.createElement("input"); chk.type="checkbox"; lbl.appendChild(chk); lbl.appendChild(document.createTextNode("Data variabile")); r2.appendChild(iAmt); r2.appendChild(lbl);
    const r3=el("div",""); const iDay=inp("number","Giorno del mese (es. 15)",""); const iDate=inp("date","",""); iDate.style.display="none"; chk.onchange=()=>{iDay.style.display=chk.checked?"none":"";iDate.style.display=chk.checked?"":"none";}; r3.appendChild(iDay); r3.appendChild(iDate);
    const sv=el("button","btn btn-dark","✓ Salva scadenza");
    sv.onclick=()=>{if(!iName.value||!iAmt.value)return;update(d=>{d.bills.push({id:uid(),label:iName.value,amount:Number(iAmt.value),type:sType.value,dayOfMonth:iDay.value,variable:chk.checked,dueDate:iDate.value,paid:false,month:null});});ui.showAddBill=false;};
    fb.appendChild(r1);fb.appendChild(r2);fb.appendChild(r3);fb.appendChild(sv);c.appendChild(fb);
  }
  if(unpaid.length===0&&paid.length===0) c.appendChild(el("div","empty","Nessuna scadenza configurata"));
  if(unpaid.length===0&&paid.length>0) c.appendChild(el("div","empty","🎉 Tutto pagato questo mese!"));
  unpaid.forEach(b=>c.appendChild(makeBillRow(b)));
  if(unpaid.length>0){const tl=el("div","total-line");tl.innerHTML=`Da pagare: <strong>${fmt(unpaid.reduce((s,b)=>s+Number(b.amount),0))}</strong>`;c.appendChild(tl);}
  if(paid.length>0){c.appendChild(el("div","divider","✅ Pagati questo mese"));paid.forEach(b=>{const w=el("div","opacity-60");w.appendChild(makeBillRow(b));c.appendChild(w);});const tl=el("div","total-line");tl.innerHTML=`Pagati: <strong>${fmt(paid.reduce((s,b)=>s+Number(b.amount),0))}</strong>`;c.appendChild(tl);}
  return c;
}

function makeBillRow(b) {
  const row=el("div","bill-row"+(b.urgent?" urgent":""));
  const left=el("div",""); left.style.cssText="display:flex;align-items:center";
  left.appendChild(el("span","bill-icon",BILL_ICONS[b.type]||"📄"));
  const info=el("div"); const nm=el("div","bill-name",b.label);
  if(b.urgent) nm.appendChild(el("span","badge-urgent","⚠️ In scadenza"));
  info.appendChild(nm); info.appendChild(el("div","bill-sub",b.variable?(b.dueDate||"Data da definire"):`Ogni ${b.dayOfMonth} del mese`));
  left.appendChild(info); row.appendChild(left);
  const right=el("div","row-right"); right.appendChild(el("span","row-value",fmt(b.amount)));
  const payBtn=el("button","btn-pay",b.isPaid?"✓ Pagato":"Paga"); payBtn.style.background=b.isPaid?"#27ae60":"#2c2c2c";
  payBtn.onclick=()=>update(d=>{d.bills=d.bills.map(x=>x.id===b.id?{...x,paid:!b.isPaid,month:!b.isPaid?viewMonth:null}:x);});
  const del=el("button","btn btn-icon","🗑️"); del.style.color="#e74c3c";
  del.onclick=()=>update(d=>{d.bills=d.bills.filter(x=>x.id!==b.id);});
  right.appendChild(payBtn); right.appendChild(del); row.appendChild(right); return row;
}

// ── SHOP ──────────────────────────────────────────────────────────────────────
function renderShop() {
  const shopCats=data.shopCats||DEFAULT_SHOP_CATS, firstCat=shopCats[0]?shopCats[0].name:"Alimentari";
  const c=card("🛒 Lista della Spesa","#e67e22");
  const fb=el("div","formbox");
  const r1=el("div","frow");
  const iItem=inp("text","Articolo…","","flex:3;min-width:0"); iItem.onkeydown=ev=>{if(ev.key==="Enter")addShopItem();};
  const iQty=inp("number","Qtà","1","flex:1;min-width:50px");
  r1.appendChild(iItem); r1.appendChild(iQty);
  const catNames=shopCats.map(x=>x.name); const sCat=sel(catNames,firstCat); sCat.style.flex="1";
  const sSub=sel(["— Sottocategoria —"],"","flex:1"); sSub.style.display="none";
  const catRow=el("div","frow"); catRow.appendChild(sCat); catRow.appendChild(sSub);
  const addBtn2=el("button","btn btn-dark","+ Aggiungi");
  function addShopItem(){if(!iItem.value)return;update(d=>{d.shoppingList.push({id:uid(),label:iItem.value,qty:iQty.value||"1",category:sCat.value,subcategory:sSub.value||"",checked:false});});}
  addBtn2.onclick=addShopItem;
  fb.appendChild(r1); fb.appendChild(catRow); fb.appendChild(addBtn2); c.appendChild(fb);
  const toggleBtn=el("button","toggle-presets",ui.showPresets?"▲ Nascondi lista rapida":"▼ Aggiungi da lista rapida");
  toggleBtn.onclick=()=>{ui.showPresets=!ui.showPresets;render();};
  c.appendChild(toggleBtn);
  if(ui.showPresets){const pw=el("div","presets-wrap");data.shoppingPresets.forEach(p=>{const btn=el("button","preset-btn",p);btn.onclick=()=>{if(data.shoppingList.find(i=>i.label===p&&!i.checked))return;update(d=>{d.shoppingList.push({id:uid(),label:p,qty:"1",category:firstCat,subcategory:"",checked:false});});};pw.appendChild(btn);});c.appendChild(pw);}
  const unchecked=data.shoppingList.filter(i=>!i.checked), checked=data.shoppingList.filter(i=>i.checked);
  if(unchecked.length===0&&checked.length===0) c.appendChild(el("div","empty","La lista è vuota"));
  shopCats.forEach(cat=>{const items=unchecked.filter(i=>i.category===cat.name);if(!items.length)return;c.appendChild(el("div","shop-cat-label",cat.name));items.forEach(item=>c.appendChild(makeShopItem(item,false)));});
  const uncatItems=unchecked.filter(i=>!shopCats.find(c2=>c2.name===i.category));
  if(uncatItems.length){c.appendChild(el("div","shop-cat-label","Altro"));uncatItems.forEach(item=>c.appendChild(makeShopItem(item,false)));}
  if(checked.length>0){c.appendChild(el("div","divider","✅ Nel carrello ("+checked.length+")"));checked.forEach(item=>c.appendChild(makeShopItem(item,true)));const clr=el("button","clear-cart","🗑️ Svuota carrello");clr.onclick=()=>update(d=>{d.shoppingList=d.shoppingList.filter(i=>!i.checked);});c.appendChild(clr);}
  return c;
}

function makeShopItem(item,done){
  const row=el("div","shop-item"+(done?" opacity-60":""));
  const chk=el("div","check-circle"+(done?" done":""),done?"✓":"");
  chk.onclick=()=>update(d=>{d.shoppingList=d.shoppingList.map(i=>i.id===item.id?{...i,checked:!i.checked}:i);});
  const info=el("div",""); info.style.flex="1";
  const lbl=el("span","",(Number(item.qty)>1?item.qty+"× ":"")+item.label);
  if(done) lbl.style.textDecoration="line-through";
  info.appendChild(lbl);
  if(item.subcategory){const sub=el("div","",item.subcategory);sub.style.cssText="font-size:10px;color:#bbb";info.appendChild(sub);}
  const del=el("button","btn btn-icon","🗑️"); del.style.color="#e74c3c";
  del.onclick=()=>update(d=>{d.shoppingList=d.shoppingList.filter(i=>i.id!==item.id);});
  row.appendChild(chk); row.appendChild(info); row.appendChild(del); return row;
}

// ── SETTINGS ──────────────────────────────────────────────────────────────────
function renderSettings(){const wrap=el("div");wrap.appendChild(renderCatManager("📤 Categorie Spese","#e74c3c","expenseCats",true,"expandedSettingsCat"));wrap.appendChild(renderCatManager("🛒 Categorie Lista Spesa","#e67e22","shopCats",false,"expandedShopSettingsCat"));wrap.appendChild(renderPresetManager());return wrap;}

function renderCatManager(title,accent,dataKey,showIcon,uiKey){
  const cats=data[dataKey]||[]; const c=card(title,accent);
  cats.forEach(cat=>{
    const sec=el("div","settings-section"); const row=el("div","settings-cat-row");
    const btn=el("button","settings-cat-btn"); if(showIcon)btn.appendChild(el("span","",cat.icon+" ")); btn.appendChild(el("span","",cat.name+" ")); btn.appendChild(el("span","settings-cat-count","("+(cat.subs||[]).length+" sottoc.) "+(ui[uiKey]===cat.id?"▲":"▼")));
    btn.onclick=()=>{ui[uiKey]=ui[uiKey]===cat.id?null:cat.id;render();};
    const delBtn=el("button","btn btn-icon","🗑️"); delBtn.style.color="#e74c3c";
    delBtn.onclick=()=>{if(cats.length<=1){alert("Devi avere almeno una categoria.");return;}update(d=>{d[dataKey]=cats.filter(x=>x.id!==cat.id);});};
    row.appendChild(btn); row.appendChild(delBtn); sec.appendChild(row);
    if(ui[uiKey]===cat.id){
      const panel=el("div","sub-panel"); if(!(cat.subs||[]).length)panel.appendChild(el("div","no-sub","Nessuna sottocategoria"));
      (cat.subs||[]).forEach(sub=>{const sr=el("div","sub-row");sr.appendChild(el("span","","• "+sub));const d2=el("button","btn btn-icon","🗑️");d2.style.color="#e74c3c";d2.onclick=()=>update(d=>{d[dataKey]=d[dataKey].map(x=>x.id===cat.id?{...x,subs:(x.subs||[]).filter(s=>s!==sub)}:x);});sr.appendChild(d2);panel.appendChild(sr);});
      const ar=el("div","frow"); ar.style.marginTop="6px"; const iSub=inp("text","Nuova sottocategoria…","","flex:1;min-width:0");
      iSub.onkeydown=ev=>{if(ev.key==="Enter"&&iSub.value.trim())update(d=>{d[dataKey]=d[dataKey].map(x=>x.id===cat.id?{...x,subs:[...(x.subs||[]),iSub.value.trim()]}:x);});};
      const aBtn=el("button","btn btn-dark","+ "); aBtn.onclick=()=>{if(!iSub.value.trim())return;update(d=>{d[dataKey]=d[dataKey].map(x=>x.id===cat.id?{...x,subs:[...(x.subs||[]),iSub.value.trim()]}:x);});};
      ar.appendChild(iSub); ar.appendChild(aBtn); panel.appendChild(ar); sec.appendChild(panel);
    }
    c.appendChild(sec);
  });
  const addSec=el("div","add-cat-section"); addSec.appendChild(el("div","add-cat-label","Aggiungi categoria:"));
  const ar=el("div","frow"); let iIcon;
  if(showIcon){iIcon=inp("text","🏷️","📦","width:44px;text-align:center;padding:7px 4px;flex-shrink:0");ar.appendChild(iIcon);}
  const iName=inp("text","Nome categoria…","","flex:1;min-width:0");
  const aBtn=el("button","btn btn-dark","+ "); aBtn.onclick=()=>{if(!iName.value.trim())return;update(d=>{d[dataKey]=[...d[dataKey],{id:uid(),name:iName.value.trim(),icon:showIcon?(iIcon.value||"📦"):"",subs:[]}];});};
  iName.onkeydown=ev=>{if(ev.key==="Enter")aBtn.click();};
  ar.appendChild(iName); ar.appendChild(aBtn); addSec.appendChild(ar); c.appendChild(addSec); return c;
}

function renderPresetManager(){
  const c=card("⚡ Lista rapida spesa","#e67e22"); const wrap=el("div","presets-wrap");
  data.shoppingPresets.forEach(p=>{const tag=el("div","preset-tag");tag.appendChild(el("span","",p));const d=el("button","preset-del","✕");d.onclick=()=>update(dd=>{dd.shoppingPresets=dd.shoppingPresets.filter(x=>x!==p);});tag.appendChild(d);wrap.appendChild(tag);});
  c.appendChild(wrap);
  const ar=el("div","frow"); const iP=inp("text","Nuovo articolo rapido…","","flex:1;min-width:0");
  const aBtn=el("button","btn btn-dark","+ "); aBtn.onclick=()=>{if(!iP.value.trim()||data.shoppingPresets.includes(iP.value.trim()))return;update(d=>{d.shoppingPresets.push(iP.value.trim());});};
  iP.onkeydown=ev=>{if(ev.key==="Enter")aBtn.click();};
  ar.appendChild(iP); ar.appendChild(aBtn); c.appendChild(ar); return c;
}

function card(title,accent){const c=el("div","card");c.style.borderTop="4px solid "+accent;const t=el("div","card-title",title);t.style.color=accent;c.appendChild(t);return c;}

handleOAuthCallback();
render();
if (accessToken && accessToken !== "local_only") syncFromDrive();
